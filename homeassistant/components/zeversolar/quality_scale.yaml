rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      Entities of this integration use DataUpdateCoordinator and do not
      explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      This integration does not provide configuration options (no options flow).
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: |
      This integration does not require authentication.
  test-coverage:
    status: todo
    comment: |
      Planned improvements: move init_integration to a conftest fixture with a
      unique_id matching what the config flow sets; update mock patch targets to
      the use site (homeassistant.components.zeversolar.coordinator); use the
      shared config_entry fixture in test_abort_already_configured.
  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: |
      The inverter uses a locally administered MAC address (not tied to a
      registered IEEE OUI), so DHCP-based discovery is not feasible. The device
      does not advertise via mDNS, SSDP, or any other discovery protocol.
      Manual host entry is the only viable setup path.
  discovery-update-info:
    status: exempt
    comment: |
      Same rationale as discovery: the device uses a locally administered MAC
      address and does not advertise via any network discovery protocol.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      This integration represents a single device per config entry.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: |
      This integration represents a single device per config entry.

  # Platinum
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
