  target:
    entity:
      domain: timer_list
      supported_features:
        - timer_list.TimerListEntityFeature.PAUSE_TIMER
  fields:
    timer_id:
      required: true
      example: "01HZ8ABCDEF0123456789ABCDE"
      selector:
        text:
