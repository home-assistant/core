start_timer:
  target:
    entity:
      domain: timer_list
      supported_features:
        - timer_list.TimerListEntityFeature.START_TIMER
  fields:
    name:
      example: "Pasta"
      selector:
        text:
    duration:
      required: true
      example: "00:05:00"
      selector:
        duration:
