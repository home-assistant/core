# Services for Portainer

prune_images:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Endpoint
    until:
      required: false
      selector:
        duration:
    dangling:
      required: false
      selector:
        boolean: {}

pause_container:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Endpoint
    container_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Container

unpause_container:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Endpoint
    container_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Container
