# Services for Portainer

prune_images:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Endpoint
    until:
      required: false
      selector:
        duration:
    dangling:
      required: false
      selector:
        boolean: {}

recreate_container:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Endpoint
    container_device_id:
      required: true
      selector:
        device:
          integration: portainer
          model: Container
    timeout:
      required: false
      selector:
        duration:
    pull_image:
      required: false
      selector:
        boolean: {}
