.power_threshold_entity: &power_threshold_entity
  - domain: input_number
    unit_of_measurement:
      - "mW"
      - "W"
      - "kW"
      - "MW"
      - "GW"
      - "TW"
      - "BTU/h"
  - domain: sensor
    device_class: power
  - domain: number
    device_class: power

.power_threshold_number: &power_threshold_number
  mode: box

is_value:
  target:
    entity:
      - domain: sensor
        device_class: power
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          mode: condition
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *power_threshold_entity
          mode: is
          number: *power_threshold_number
