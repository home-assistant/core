.number_or_entity_power: &number_or_entity_power
  required: false
  selector:
    choose:
      choices:
        number:
          selector:
            number:
              mode: box
        entity:
          selector:
            entity:
              filter:
                - domain: input_number
                  unit_of_measurement:
                    - "mW"
                    - "W"
                    - "kW"
                    - "MW"
                    - "GW"
                    - "TW"
                    - "BTU/h"
                - domain: sensor
                  device_class: power
                - domain: number
                  device_class: power
      translation_key: number_or_entity

.condition_unit_power: &condition_unit_power
  required: false
  selector:
    select:
      options:
        - "mW"
        - "W"
        - "kW"
        - "MW"
        - "GW"
        - "TW"
        - "BTU/h"

is_value:
  target:
    entity:
      - domain: number
        device_class: power
      - domain: sensor
        device_class: power
  fields:
    behavior:
      required: true
      default: any
      selector:
        select:
          translation_key: condition_behavior
          options:
            - all
            - any
    above: *number_or_entity_power
    below: *number_or_entity_power
    unit: *condition_unit_power
