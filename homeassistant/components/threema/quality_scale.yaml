rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: Integration only sends messages, no polling required.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration does not use event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: exempt
    comment: Image entity availability is based on local QR code generation, not external service state.
  parallel-updates:
    status: exempt
    comment: Image entity is static (generated once), no parallel update concerns.
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: Cloud service, not discoverable on the network.
  discovery-update-info:
    status: exempt
    comment: Cloud service, not discoverable on the network.
  docs-data-update:
    status: exempt
    comment: Integration does not poll or update data.
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Service integration, no physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Single static gateway device per config entry.
  entity-category:
    status: exempt
    comment: QR code image entity is a primary security verification feature, no diagnostic or config category applies.
  entity-device-class:
    status: exempt
    comment: No applicable device class for QR code image or notify entities.
  entity-disabled-by-default:
    status: exempt
    comment: QR code entity is used for gateway identity verification and should be visible by default.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No scenarios requiring repair issues.
  stale-devices:
    status: exempt
    comment: Single static device per config entry.
