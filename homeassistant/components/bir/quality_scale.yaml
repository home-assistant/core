rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      Entities of this integration do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      This integration does not have an options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      This integration uses public application credentials managed by the library.
      There are no user-provided credentials to re-authenticate.
  test-coverage: done
  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: |
      This is a cloud polling integration, not a local device.
  discovery:
    status: exempt
    comment: |
      This is a cloud polling integration, not a local device.
  docs-data-update: done
  docs-examples:
    status: exempt
    comment: |
      Integration is fully UI-configured and has no actions or YAML configuration to provide examples for.
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: |
      Integration does not support specific devices, but rather provides sensors for waste pickup dates based on address and property information.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Each config entry represents a single address/property.
  entity-category:
    status: exempt
    comment: |
      All sensors are primary entities showing next pickup dates.
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: exempt
    comment: |
      This integration does not raise user-facing exceptions.
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: |
      There are no known issues that require user intervention.
  stale-devices: done
  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
