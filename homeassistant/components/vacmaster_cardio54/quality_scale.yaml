rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not register custom service actions.
  appropriate-polling:
    status: exempt
    comment: |
      This integration transmits RF commands and does not poll.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not register custom service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: exempt
    comment: |
      The transmitter and device ID are read from the config entry data.
  test-before-configure: done
  test-before-setup:
    status: exempt
    comment: |
      RF transmission is a one-way broadcast with no device to contact at setup.
  unique-config-entry: done
  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      This integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      This integration does not authenticate.
  test-coverage: done
  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: |
      This integration does not support discovery.
  discovery:
    status: exempt
    comment: |
      RF devices cannot be discovered — pairing is initiated manually by the
      user via the config flow.
  docs-data-update:
    status: exempt
    comment: |
      RF transmission is one-way; there is no data update.
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Each config entry represents a single static device.
  entity-category:
    status: exempt
    comment: |
      The fan entity represents the primary device function.
  entity-device-class:
    status: exempt
    comment: |
      Fan entities do not have device classes.
  entity-disabled-by-default:
    status: exempt
    comment: |
      The fan entity represents the primary device function.
  entity-translations:
    status: exempt
    comment: |
      The fan entity uses the device name.
  exception-translations:
    status: exempt
    comment: |
      This integration does not raise its own exceptions. Underlying
      transmit errors already surface as translated ``HomeAssistantError``s
      from the ``radio_frequency`` integration.
  icon-translations:
    status: exempt
    comment: |
      The fan uses the default icon for its state.
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: |
      No known repairable issues.
  stale-devices:
    status: exempt
    comment: |
      Each config entry represents a single static device.
  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      This integration does not use a web session.
  strict-typing: todo
