rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      This integration does not provide additional actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      Entities of this integration do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      This integration does not provide actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      This integration does not have an options flow.
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: |
      This integration does not require authentication.
  test-coverage: done
  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: |
      This integration cannot be discovered; it connects to a cloud service
      using the user's address.
  discovery:
    status: exempt
    comment: |
      This integration cannot be discovered; it connects to a cloud service
      using the user's address.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices:
    status: exempt
    comment: |
      This is a service integration, not a device integration.
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      This integration has a single fixed device representing the service.
  entity-category:
    status: exempt
    comment: |
      The calendar entity is the primary entity of this integration and
      does not warrant a diagnostic or config category.
  entity-device-class:
    status: exempt
    comment: |
      The calendar platform does not support device classes.
  entity-disabled-by-default:
    status: exempt
    comment: |
      The calendar entity is the primary and only entity; disabling it by
      default would make the integration non-functional out of the box.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: |
      This integration has no cases where a repair issue would be needed.
  stale-devices:
    status: exempt
    comment: |
      This integration has a single fixed device representing the service.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
