send_command:
  name: Send command
  description: "Send a raw BLE command to the heater for debugging purposes."
  fields:
    device_id:
      name: Device
      description: "MAC address or last 4-5 characters of heater MAC (e.g., 'B864' or 'A4:C1:37:24:B8:64'). Leave empty to send to all heaters."
      required: false
      example: "B864"
      selector:
        text:
    command:
      name: Command code
      description: "Command number (0-255)."
      required: true
      example: 20
      selector:
        number:
          min: 0
          max: 255
          mode: box
    argument:
      name: Argument value
      description: "Argument value (-128 to 127). Negative values are encoded as two's complement."
      required: true
      example: 0
      selector:
        number:
          min: -128
          max: 127
          mode: box
