rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      No custom actions
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      No custom actions
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      No custom actions
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: |
      Authentication is a static PIN code configured at setup; no re-auth needed.
  test-coverage: todo
  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: |
      No network discovery; BLE devices are discovered via the bluetooth integration.
  discovery: done
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      Only one device per config entry. New devices are set up as new entries.
  entity-category:
    status: exempt
    comment: |
      Only a climate entity is exposed.
  entity-device-class:
    status: exempt
    comment: |
      Only a climate entity is exposed; no device class needed.
  entity-disabled-by-default:
    status: exempt
    comment: |
      Only a climate entity is exposed.
  entity-translations: done
  exception-translations: todo
  icon-translations:
    status: exempt
    comment: |
      No custom icons.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: |
      No repairs/issues.
  stale-devices:
    status: exempt
    comment: |
      Device type integration; one device per entry.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: |
      Not a network-based integration; uses BLE via bleak.
  strict-typing: todo
