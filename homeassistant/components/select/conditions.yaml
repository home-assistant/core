is_option_selected:
  target:
    entity:
      - domain: select
      - domain: input_select
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          mode: condition
    option:
      context:
        filter_target: target
      required: true
      selector:
        state:
          hide_states:
            - unavailable
            - unknown
          multiple: true
