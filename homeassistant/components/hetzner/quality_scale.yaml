rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities of this integration do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not register custom actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration does not have any configuration parameters.
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: Hetzner Cloud is a cloud service and cannot be discovered.
  discovery-update-info:
    status: exempt
    comment: Hetzner Cloud is a cloud service and cannot be discovered.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: All entities are relevant for the user.
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: Integration does not raise any repairable issues.
  stale-devices: todo

  # Platinum
  async-dependency:
    status: todo
    comment: The hcloud library is synchronous and wrapped with async_add_executor_job.
  inject-websession:
    status: exempt
    comment: The hcloud library manages its own HTTP session.
  strict-typing: todo
