.trigger_common_fields: &trigger_common_fields
  behavior:
    required: true
    default: any
    selector:
      automation_behavior:
        translation_key: trigger_behavior
        mode: trigger

detected:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: occupancy

cleared:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: occupancy
