rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration registers no custom services/actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration provides no custom actions.
  docs-conditions:
    status: exempt
    comment: This integration does not provide conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not provide triggers.
  entity-event-setup:
    status: exempt
    comment: This integration does not subscribe to external entity events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration registers no custom actions.
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: The DVLA Vehicle Enquiry Service uses an application API key and has no user reauthentication flow.
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: Vehicles are added manually by registration number and cannot be discovered.
  discovery-update-info:
    status: exempt
    comment: This integration does not use discovery.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Vehicles are statically configured by config entries.
  entity-category: todo
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: Vehicles are removed by removing their config entry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
