rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not provide service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not provide service actions.
  config-entry-unloading: todo
  docs-configuration-parameters:
    status: exempt
    comment: The integration has no configuration options.
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: todo
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: Device uses unauthenticated local HTTP; no credentials to re-auth.
  test-coverage: todo

  # Gold
  devices: todo
  diagnostics: todo
  discovery-update-info: todo
  discovery: todo
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Device phases are fixed hardware; no dynamic device addition.
  entity-category: done
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations:
    status: exempt
    comment: >-
      The integration does not raise translated exceptions; it exposes only
      read-only sensors and has no service actions.
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No known scenarios requiring repair flows.
  stale-devices:
    status: exempt
    comment: Devices correspond to fixed hardware phases; no stale device scenario.

  # Platinum
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
