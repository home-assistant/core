rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration does not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration does not have an options flow.
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: todo
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: Cloud-based integration, devices cannot be discovered on local network.
  discovery-update-info:
    status: exempt
    comment: Cloud-based integration, no local discovery information to update.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category:
    status: exempt
    comment: Fan entities do not have diagnostic categorization.
  entity-device-class:
    status: exempt
    comment: Fan platform does not use device classes.
  entity-disabled-by-default:
    status: exempt
    comment: All fan entities are enabled by default.
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: Fan entities use default icons.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: Integration does not have cases where raising a repair issue is needed.
  stale-devices: todo

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
