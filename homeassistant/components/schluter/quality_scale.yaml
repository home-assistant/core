rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      Integration does not define custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      Integration does not define custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      Entities do not subscribe to events explicitly.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup:
    status: done
    comment: |
      Done implicitly with `await coordinator.async_config_entry_first_refresh()`.
  unique-config-entry: done
  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      Integration does not use an options flow.
  docs-installation-parameters: done
  entity-unavailable:
    status: done
    comment: |
      Done implicitly via DataUpdateCoordinator and CoordinatorEntity.
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: |
      Done implicitly via DataUpdateCoordinator.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done
  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: |
      Cloud polling integration; no local discovery.
  discovery:
    status: exempt
    comment: |
      Cloud polling integration; no local discovery.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: |
      Devices are fixed at account level; no dynamic addition during runtime.
  entity-category: todo
  entity-translations: todo
  entity-disabled-by-default: todo
  exception-translations: done
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: done
    comment: |
      A repair issue is raised when YAML configuration is detected, prompting users to migrate to the UI.
  stale-devices: todo
  # Platinum
  async-dependency:
    status: exempt
    comment: |
      Integration does not use an external library.
  inject-websession: done
  strict-typing: todo
