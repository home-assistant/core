.trigger_common_fields:
  behavior: &trigger_behavior
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

.number_or_entity: &number_or_entity
  required: false
  selector:
    choose:
      choices:
        number:
          selector:
            number:
              mode: box
              unit_of_measurement: "%"
        entity:
          selector:
            entity:
              filter:
                domain:
                  - input_number
                  - number
                  - sensor
      translation_key: number_or_entity

.trigger_threshold_type: &trigger_threshold_type
  required: true
  default: above
  selector:
    select:
      options:
        - above
        - below
        - between
        - outside
      translation_key: trigger_threshold_type

.trigger_target_battery: &trigger_target_battery
  entity:
    - domain: binary_sensor
      device_class: battery

.trigger_target_charging: &trigger_target_charging
  entity:
    - domain: binary_sensor
      device_class: battery_charging

.trigger_target_percentage: &trigger_target_percentage
  entity:
    - domain: sensor
      device_class: battery
    - domain: number
      device_class: battery

low:
  fields:
    behavior: *trigger_behavior
  target: *trigger_target_battery

not_low:
  fields:
    behavior: *trigger_behavior
  target: *trigger_target_battery

started_charging:
  fields:
    behavior: *trigger_behavior
  target: *trigger_target_charging

stopped_charging:
  fields:
    behavior: *trigger_behavior
  target: *trigger_target_charging

percentage_changed:
  target: *trigger_target_percentage
  fields:
    above: *number_or_entity
    below: *number_or_entity

percentage_crossed_threshold:
  target: *trigger_target_percentage
  fields:
    behavior: *trigger_behavior
    threshold_type: *trigger_threshold_type
    lower_limit: *number_or_entity
    upper_limit: *number_or_entity
