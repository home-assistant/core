.condition_common: &condition_common
  target: &target_battery_binary_sensor
    entity:
      - domain: binary_sensor
        device_class: battery
  fields:
    behavior: &condition_behavior
      required: true
      default: any
      selector:
        select:
          translation_key: condition_behavior
          options:
            - all
            - any

is_low: *condition_common

is_high: *condition_common

is_charging:
  target:
    entity:
      - domain: binary_sensor
        device_class: battery_charging
  fields:
    behavior: *condition_behavior

is_not_charging:
  target:
    entity:
      - domain: binary_sensor
        device_class: battery_charging
  fields:
    behavior: *condition_behavior

percentage:
  target:
    entity:
      - domain: sensor
        device_class: battery
      - domain: number
        device_class: battery
  fields:
    behavior: *condition_behavior
    above:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    below:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
