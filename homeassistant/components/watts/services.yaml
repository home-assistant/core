activate_timer_mode:
  target:
    entity:
      domain: climate
      integration: watts
  fields:
    temperature:
      required: true
      selector:
        number:
          min: 5
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
    duration:
      required: true
      selector:
        number:
          min: 1
          max: 1440
          step: 1
          unit_of_measurement: "min"
          mode: box
