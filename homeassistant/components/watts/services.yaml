activate_timer_mode:
  target:
    entity:
      domain: climate
      integration: watts
  fields:
    temperature:
      required: true
      selector:
        number:
          min: 5
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: box
    duration:
      required: true
      selector:
        duration:
          enable_second: false
