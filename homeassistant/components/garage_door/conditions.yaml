.condition_common_fields: &condition_common_fields
  behavior:
    required: true
    default: any
    selector:
      select:
        translation_key: condition_behavior
        options:
          - all
          - any

is_closed:
  fields: *condition_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: garage_door
      - domain: cover
        device_class: garage

is_open:
  fields: *condition_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: garage_door
      - domain: cover
        device_class: garage
