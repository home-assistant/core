rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The initial alarm control panel platform does not expose custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The initial alarm control panel platform does not expose custom actions.
  docs-high-level-description: done
  docs-installation-instructions:
    status: done
    comment: Installation instructions are covered in the integration documentation.
  docs-removal-instructions:
    status: done
    comment: Removal instructions are covered in the integration documentation.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  docs-installation-parameters:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  entity-unavailable:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  integration-owner:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  log-when-unavailable:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  parallel-updates:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: Silver quality-scale validation is deferred to a follow-up PR.

  # Gold
  devices: done
  diagnostics: todo
  discovery: todo
  discovery-update-info: todo
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Elk E27 areas are created from the panel snapshot for one panel device.
  entity-category:
    status: exempt
    comment: The initial alarm control panel platform does not expose config or diagnostic entities.
  entity-device-class:
    status: exempt
    comment: The alarm control panel entity platform does not define device classes.
  entity-disabled-by-default: todo
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices: todo

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: The Elke27 client library uses a local TCP socket protocol, not an HTTP web session.
  strict-typing:
    status: exempt
    comment: Strict typing will be added in a later milestone.
