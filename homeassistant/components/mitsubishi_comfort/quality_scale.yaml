rules:
  # Bronze (required for new integrations)
  action-setup:
    status: exempt
    comment: No service actions registered.
  appropriate-polling:
    status: done
    comment: Polls devices every 60 seconds via DataUpdateCoordinator.
  brands:
    status: exempt
    comment: Companion PR pending.
  common-modules:
    status: done
    comment: Uses coordinator, entity, and const modules.
  config-flow:
    status: done
    comment: UI-based setup with username/password.
  config-flow-test-coverage:
    status: done
    comment: Full test coverage for all config flow steps.
  dependency-transparency:
    status: done
    comment: mitsubishi-comfort library is MIT-licensed with public CI.
  docs-actions:
    status: exempt
    comment: No service actions.
  docs-high-level-description:
    status: exempt
    comment: Companion PR pending.
  docs-installation-instructions:
    status: exempt
    comment: Companion PR pending.
  docs-removal-instructions:
    status: exempt
    comment: Companion PR pending.
  entity-event-setup:
    status: done
    comment: Entities subscribe to coordinator updates via CoordinatorEntity.
  entity-unique-id:
    status: done
    comment: Uses device serial as unique ID.
  has-entity-name:
    status: done
    comment: All entities set _attr_has_entity_name = True.
  runtime-data:
    status: done
    comment: Uses ConfigEntry.runtime_data to store coordinators.
  test-before-configure:
    status: done
    comment: Config flow validates cloud login and device discovery.
  test-before-setup:
    status: done
    comment: async_setup_entry verifies login and device discovery.
  unique-config-entry:
    status: done
    comment: Uses username as unique ID to prevent duplicates.

  # Silver
  config-entry-unloading:
    status: done
    comment: Unloads platforms and closes device sessions.
  log-when-unavailable:
    status: done
    comment: Coordinator logs warnings on consecutive failures.
  entity-unavailable:
    status: done
    comment: Entities delegate availability to coordinator.
  action-exceptions:
    status: exempt
    comment: No service actions registered.
  reauthentication-flow:
    status: todo
    comment: Not yet implemented.
  parallel-updates:
    status: todo
    comment: Not yet implemented.
  test-coverage:
    status: todo
    comment: Not yet at 95% coverage.
  integration-owner:
    status: done
    comment: "@nikolairahimi is listed as codeowner."
  docs-installation-parameters:
    status: exempt
    comment: Companion PR pending.
  docs-configuration-parameters:
    status: exempt
    comment: This integration has no options flow.

  # Gold
  entity-translations:
    status: todo
    comment: Not yet implemented.
  entity-device-class:
    status: todo
    comment: Not yet implemented.
  devices:
    status: done
    comment: Each physical unit is registered as a device.
  entity-category:
    status: exempt
    comment: Single climate entity per device, no diagnostic entities yet.
  entity-disabled-by-default:
    status: exempt
    comment: Single climate entity per device, should be enabled.
  discovery:
