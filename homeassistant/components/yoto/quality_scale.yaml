rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not register custom service actions.
  appropriate-polling:
    status: done
    comment: Live state is pushed over MQTT; the coordinator polls REST every 5 min only for the device roster and player config (firmware, day/night times).
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not register custom service actions.
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  entity-event-setup:
    status: exempt
    comment: Real-time updates are dispatched through the coordinator, not via per-entity event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not register custom service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: This integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Cloud connection; DHCP discovery only triggers setup, no network address is persisted to update.
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: No noisy or less popular entities; nothing is disabled by default.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: Authorization is the only configuration; reauth covers re-linking the account.
  repair-issues:
    status: exempt
    comment: Auth failures go through the reauth flow; other errors are transient and retried by the coordinator.
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
