rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not provide any actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not provide any actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities do not subscribe to external events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not provide any actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration does not provide an options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: The API does not require authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: The service cannot be discovered.
  discovery:
    status: exempt
    comment: The service cannot be discovered.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: The integration connects to a web service, not to devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: A config entry represents exactly one municipality with a fixed set of entities.
  entity-category:
    status: exempt
    comment: All entities represent the primary warning data and use the default category.
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: The integration has no user-repairable issues.
  stale-devices:
    status: exempt
    comment: A config entry represents exactly one municipality whose device is removed with the entry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
