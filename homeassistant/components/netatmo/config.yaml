config_entry:
  versions:
    - version:
        major: 1
        minor: 1
      data:
        fields:
          implementation:
            required: false
            selector:
              text: {}
      options:
        fields:
          area_name:
            required: false
            selector:
              text: {}
          lat_ne:
            required: false
            selector:
              text: {}
          lat_sw:
            required: false
            selector:
              text: {}
          lon_ne:
            required: false
            selector:
              text: {}
          lon_sw:
            required: false
            selector:
              text: {}
          mode:
            required: true
            selector:
              select:
                options:
                  - avg
                  - max
                  - min
          new_area:
            required: false
            selector:
              text: {}
          weather_areas:
            required: false
            selector:
              select:
                options: []
                multiple: true
  subentries: {}
