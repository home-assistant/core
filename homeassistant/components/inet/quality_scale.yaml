rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling:
    status: exempt
    comment: Integration uses local push via UDP notifications.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Protocol has no authentication.
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info: done
  discovery: done
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Single device per config entry, not a hub integration.
  entity-category:
    status: exempt
    comment: The only entity is the primary media player.
  entity-device-class:
    status: exempt
    comment: Media player platform does not support device classes.
  entity-disabled-by-default:
    status: exempt
    comment: The only entity is the primary media player.
  entity-translations:
    status: exempt
    comment: The single entity uses the device name directly (name is None).
  exception-translations: done
  icon-translations:
    status: done
    comment: Uses platform-default media player icons.
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: Single device per config entry; removal handles cleanup.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: Uses UDP protocol, no HTTP session needed.
  strict-typing: todo
