rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      No custom actions are defined.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency:
    status: todo
    comment: |
      Unfortunately the dependency lacks PyPi publishing within the workflow. Reference issue 226 in proxmoxer/proxmoxer.
  docs-actions:
    status: exempt
    comment: |
      No custom actions are defined.
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  entity-event-setup:
    status: exempt
    comment: |
      No explicit event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      No custom actions are defined.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Not discoverable, infrastructure components are static
  discovery:
    status: exempt
    comment: Not discoverable
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices: todo

  # Platinum
  async-dependency:
    status: todo
    comment: |
      The upstream client library (proxmoxer) performs synchronous HTTP I/O using requests. This integration offloads those calls to an executor. Reference issue 209 in proxmoxer/proxmoxer.
  inject-websession:
    status: todo
    comment: The upstream client library (proxmoxer) does not support injecting HA aiohttp ClientSession
  strict-typing: todo
