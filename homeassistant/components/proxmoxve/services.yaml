vm_command_wait:
  fields:
    node:
      required: true
      selector:
        text:
    vmid:
      required: true
      selector:
        number:
          min: 1
          mode: box
    command:
      required: true
      selector:
        select:
          options:
            - start
            - stop
            - shutdown
            - restart
            - reset
            - hibernate
    resource_type:
      default: qemu
      selector:
        select:
          options:
            - qemu
            - lxc
    entry_id:
      selector:
        text:
    timeout:
      default: 120
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: seconds
          mode: box
    poll_interval:
      default: 1
      selector:
        number:
          min: 0.2
          max: 30
          step: 0.1
          unit_of_measurement: seconds
          mode: box
