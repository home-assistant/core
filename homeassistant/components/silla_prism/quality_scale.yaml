  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: The integration has no repairable issues.
  stale-devices:
    status: exempt
    comment: A config entry maps to a single Prism device, removed with the entry.

  # Platinum
  async-dependency: done
