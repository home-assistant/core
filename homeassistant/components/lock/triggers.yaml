.trigger_common: &trigger_common
  target:
    entity:
      domain: lock
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          translation_key: trigger_behavior
          behavior:
            - first
            - last
            - any

jammed: *trigger_common
locked: *trigger_common
opened: *trigger_common
unlocked: *trigger_common
