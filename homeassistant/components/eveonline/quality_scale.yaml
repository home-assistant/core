rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not provide service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not provide service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration uses DataUpdateCoordinator; entities do not subscribe to events directly.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not provide service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration has no configuration parameters beyond OAuth2 credentials.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: todo
    comment: Will be added in a follow-up PR.
  test-coverage: done

  # Gold
  devices: done
  diagnostics:
    status: todo
    comment: Will be added in a follow-up PR.
  discovery:
    status: exempt
    comment: Eve Online is a cloud service — no local discovery possible.
  discovery-update-info:
    status: exempt
    comment: Eve Online is a cloud service — no local discovery possible.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Eve Online is a cloud service and does not integrate physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Characters are added via config entries, not discovered dynamically.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: Integration is OAuth2-only with no user-configurable parameters; reconfiguration is not applicable.
  repair-issues:
    status: exempt
    comment: Integration does not raise repair issues.
  stale-devices:
    status: exempt
    comment: Devices represent EVE characters tied to config entries — they are never stale.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
