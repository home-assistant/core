rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not provide service actions.
  appropriate-polling: done
  brands:
    status: done
    comment: "Brands PR submitted: https://github.com/home-assistant/brands/pull/10133"
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not provide service actions.
  docs-high-level-description:
    status: done
    comment: "Docs PR submitted: https://github.com/home-assistant/home-assistant.io/pull/44762"
  docs-installation-instructions:
    status: done
    comment: "Docs PR submitted: https://github.com/home-assistant/home-assistant.io/pull/44762"
  docs-removal-instructions:
    status: done
    comment: "Docs PR submitted: https://github.com/home-assistant/home-assistant.io/pull/44762"
  entity-event-setup:
    status: exempt
    comment: Integration uses DataUpdateCoordinator; entities do not subscribe to events directly.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: >-
      The integration uses OAuth2; the token exchange with the EVE SSO server
      is the only pre-configure step possible. No additional connectivity test
      can be performed before the OAuth round-trip completes.
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not provide service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration has no options flow.
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: todo
  reauthentication-flow: todo
  test-coverage: todo

  # Gold
  devices: todo
  diagnostics: todo
  discovery:
    status: exempt
    comment: Eve Online is a cloud service — no local discovery possible.
  discovery-update-info:
    status: exempt
    comment: Eve Online is a cloud service — no local discovery possible.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices:
    status: exempt
    comment: Eve Online is a cloud service with no physical devices.
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Each config entry represents a single character; the device topology is fixed.
  entity-category: todo
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow:
    status: exempt
    comment: OAuth2-only integration with no user-configurable settings.
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: Each config entry represents a single character; devices never go stale.

  # Platinum
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
