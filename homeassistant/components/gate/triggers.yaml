.trigger_common_fields: &trigger_common_fields
  behavior:
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

closed:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: cover
        device_class: gate

opened:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: cover
        device_class: gate
