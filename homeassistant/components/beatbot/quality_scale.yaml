    status: done
    comment: WebSocket push is primary; a 10 minute coordinator poll reconciles discovery and missed events.
  brands:
    status: done
    comment: The Beatbot icon is submitted in home-assistant/brands#10816.
  common-modules: done
  config-flow: done
