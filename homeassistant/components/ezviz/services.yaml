set_alarm_detection_sensibility:
  target:
    entity:
      integration: ezviz
      domain: camera
  fields:
    level:
      required: true
      example: 3
      default: 3
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: box
    type_value:
      required: true
      example: "0"
      default: "0"
      selector:
        select:
          options:
            - "0"
            - "3"

wake_device:
  target:
    entity:
      integration: ezviz
      domain: camera

set_polling_interval:
  fields:
    interval:
      required: true
      example: 1
      default: 1
      selector:
        number:
          min: 1
          max: 15
          step: 1
          unit_of_measurement: seconds
          mode: box
    duration:
      required: true
      example: 60
      default: 60
      selector:
        number:
          min: 1
          max: 240
          step: 1
          unit_of_measurement: seconds
          mode: box
