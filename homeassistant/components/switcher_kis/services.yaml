set_auto_off:
  target:
    entity:
      integration: switcher_kis
      domain: switch
      device_class: switch
  fields:
    auto_off:
      required: true
      example: '"02:30"'
      selector:
        text:

turn_on_with_timer:
  target:
    entity:
      integration: switcher_kis
      domain: switch
      device_class: switch
  fields:
    timer_minutes:
      required: true
      selector:
        number:
          min: 1
          max: 150
          unit_of_measurement: minutes

get_schedules:
  target:
    entity:
      integration: switcher_kis
      domain: switch
      supported_features:
        - switcher_kis.SwitcherEntityFeature.SCHEDULES

create_schedule:
  target:
    entity:
      integration: switcher_kis
      domain: switch
      supported_features:
        - switcher_kis.SwitcherEntityFeature.SCHEDULES
  fields:
    start_time:
      required: true
      example: '"07:00"'
      selector:
        time:
    end_time:
      required: true
      example: '"07:30"'
      selector:
        time:
    days:
      required: false
      selector:
        select:
          multiple: true
          translation_key: days
          options:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday

delete_schedule:
  target:
    entity:
      integration: switcher_kis
      domain: switch
      supported_features:
        - switcher_kis.SwitcherEntityFeature.SCHEDULES
  fields:
    schedule_id:
      required: true
      selector:
        select:
          options:
            - "0"
            - "1"
            - "2"
            - "3"
            - "4"
            - "5"
            - "6"
            - "7"
