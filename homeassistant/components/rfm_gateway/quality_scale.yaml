rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register any service actions.
  appropriate-polling:
    status: exempt
    comment: Integration does not poll.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register any service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration does not subscribe to events.
  entity-unique-id:
    status: exempt
    comment: Integration only provides a transmitter entity and no remote device IDs.
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: todo
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
    comment: Integration has no authentication.
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery: done
  discovery-update-info: done
  docs-data-update: todo
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Integration exposes a single gateway device.
  entity-category:
    status: exempt
    comment: Integration has no category-specific entities.
  entity-device-class:
    status: exempt
    comment: Integration has no entities with a device class.
  entity-disabled-by-default:
    status: exempt
    comment: Integration has no entities disabled by default.
  entity-translations:
    status: exempt
    comment: Integration has no translated entity names.
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: Integration has one static device per config entry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
