rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: |
      The integration does not perform periodic polling for data; it is a push-based integration (local_push) where state is updated via service calls.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: |
      The integration does not subscribe to any external events, library callbacks, or internal Home Assistant bus events that require lifecycle management within its entities.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
