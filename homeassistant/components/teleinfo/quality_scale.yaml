rules:
  # Bronze
  action-setup:
    status: exempt
    comment: No actions/services in this integration.
  appropriate-polling:
    status: done
    comment: 10s interval is valid for local serial (min 5s).
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No actions/services in this integration.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: No event entities in this integration.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No actions/services in this integration.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable:
    status: done
    comment: CoordinatorEntity marks entities unavailable automatically when UpdateFailed is raised.
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: DataUpdateCoordinator logs UpdateFailed with translation keys on communication/timeout/decode errors.
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Teleinfo protocol has no authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Single device per config entry.
  entity-category:
    status: exempt
    comment: No entities qualify as diagnostic or config — tariff/color sensors report real-world data, not device metadata.
  entity-device-class: done
  entity-disabled-by-default:
    status: done
    comment: Less-used sensors (instantaneous_current, tomorrow_color) are disabled by default.
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: done
    comment: icons.json provides icons for sensors without device class defaults.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: Read-only serial device with no user-actionable repair scenarios. Failures are transient I/O errors handled by UpdateFailed.
  stale-devices:
    status: exempt
    comment: Single device per config entry.

  # Platinum
  async-dependency: todo
  inject-websession:
    status: exempt
    comment: No HTTP calls — N/A for this integration.
  strict-typing: done
