# Describes the format for available MQTT services

publish:
  fields:
    topic:
      required: true
      example: /homeassistant/hello
      selector:
        text:
    payload:
      example: "The temperature is {{ states('sensor.temperature') }}"
      selector:
        template:
    publish_options:
      collapsed: true
      fields:
        evaluate_payload:
          default: false
          selector:
            boolean:
        qos:
          default: "0"
          selector:
            select:
              options:
                - "0"
                - "1"
                - "2"
        retain:
          default: false
          selector:
            boolean:
        message_expiry_interval:
          selector:
            duration:
              enable_day: true
dump:
  fields:
    topic:
      example: "OpenZWave/#"
      selector:
        text:
    duration:
      default: 5
      selector:
        number:
          min: 1
          max: 300
          unit_of_measurement: "seconds"

reload:
