.condition_common: &condition_common
  target:
    entity:
      - domain: timer
  fields:
    behavior:
      required: true
      default: any
      selector:
        select:
          translation_key: condition_behavior
          options:
            - all
            - any

is_active: *condition_common
is_paused: *condition_common
is_idle: *condition_common
