.trigger_common: &trigger_common
  target:
    entity:
      domain: timer
  fields:
    behavior:
      required: true
      default: any
      selector:
        select:
          options:
            - first
            - last
            - any
          translation_key: trigger_behavior
    for:
      required: true
      default: 00:00:00
      selector:
        duration:

cancelled: *trigger_common
finished: *trigger_common
paused: *trigger_common
restarted: *trigger_common
started: *trigger_common
