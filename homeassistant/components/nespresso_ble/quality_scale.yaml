rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not provide any service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide any service actions.
  docs-conditions:
    status: exempt
    comment: This integration does not provide any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not provide any triggers.
  entity-event-setup:
    status: exempt
    comment: Entities do not subscribe to events; state comes from the coordinator.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: >-
      The machine advertises only briefly and connections are unreliable during
      discovery, so we confirm without a test connection and rely on the
      coordinator's first refresh.
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not provide any service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: This integration has no configuration options.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Reads on this machine require no authentication.
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: Bluetooth address is stable and used as the unique id.
  discovery: done
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Each config entry represents a single machine.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: All exposed entities are useful by default.
  entity-translations: done
  exception-translations: done
  icon-translations: todo
  reconfiguration-flow:
    status: exempt
    comment: There is nothing to reconfigure.
  repair-issues:
    status: exempt
    comment: This integration has no repairable issues.
  stale-devices:
    status: exempt
    comment: Each config entry represents a single machine.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: This integration does not make HTTP requests.
  strict-typing: todo
