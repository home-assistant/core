rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register service actions.
  appropriate-polling:
    status: exempt
    comment: Push-based BLE integration using GATT notifications, no polling.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not have service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration does not subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup:
    status: exempt
    comment: >-
      BLE device may not be in range during setup.
      Device is expected to be disconnected most of the time
      but will connect quickly when reachable.
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not register service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: >-
      BLE pairing PIN does not expire.
      PIN can be updated via the reconfigure flow.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Device is not connected to an IP network.
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Only one device per config entry. New devices are set up as new entries.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: exempt
    comment: Integration does not raise exceptions with translatable messages.
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No repair issues needed.
  stale-devices:
    status: exempt
    comment: Only one device per config entry. Stale devices are removed with the config entry.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: BLE integration, no HTTP requests.
  strict-typing: todo
