rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Integration does not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not register custom actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: |
      PLANNED: Use freezer-based time advancement instead of directly calling async_refresh().

  # Gold
  devices: done
  diagnostics: todo
  discovery: todo
  discovery-update-info: todo
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: todo
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Single device per account, no dynamic devices.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: All entities are core functionality.
  entity-translations: done
  exception-translations: todo
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: Integration has no repair scenarios.
  stale-devices:
    status: exempt
    comment: Single device per config entry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
