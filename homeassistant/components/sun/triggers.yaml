.type: &twilight_type
  required: true
  default: civil
  selector:
    select:
      translation_key: twilight_type
      options:
        - civil
        - nautical
        - astronomical

.for: &trigger_for
  required: true
  default: "00:00:00"
  selector:
    duration:

.offset: &trigger_offset
  offset:
    required: true
    default:
      hours: 0
      minutes: 0
      seconds: 0
    selector:
      duration:
  offset_type:
    required: true
    default: before
    selector:
      select:
        translation_key: trigger_offset_type
        options:
          - before
          - after

.elevation_threshold_entity: &trigger_elevation_threshold_entity
  - domain: input_number
    unit_of_measurement: "°"
  - domain: number
    unit_of_measurement: "°"
  - domain: sensor
    unit_of_measurement: "°"

.elevation_threshold_number: &trigger_elevation_threshold_number
  min: -90
  max: 90
  mode: box
  unit_of_measurement: "°"

sunrise:
  fields:
    <<: *trigger_offset

sunset:
  fields:
    <<: *trigger_offset

solar_noon:
  fields:
    <<: *trigger_offset

solar_midnight:
  fields:
    <<: *trigger_offset

dawn:
  fields:
    type: *twilight_type
    <<: *trigger_offset

dusk:
  fields:
    type: *twilight_type
    <<: *trigger_offset

elevation_changed:
  fields:
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *trigger_elevation_threshold_entity
          mode: changed
          number: *trigger_elevation_threshold_number

elevation_crossed_threshold:
  fields:
    for: *trigger_for
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *trigger_elevation_threshold_entity
          mode: crossed
          number: *trigger_elevation_threshold_number
