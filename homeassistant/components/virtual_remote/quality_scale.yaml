rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      This integration does not provide custom actions. It uses the existing
      remote entity services such as remote.send_command.

  appropriate-polling:
    status: exempt
    comment: |
      Virtual remote entities do not poll external devices. Availability is
      derived from the linked infrared entity state.

  brands:
    status: exempt
    comment: |
      This helper integration does not require dedicated branding assets.

  common-modules: done

  config-flow:
    status: done

  config-flow-test-coverage:
    status: done
    comment: |
      Config flow tests cover the user flow,
      no-infrared-entities abort,
      invalid infrared entity selection,
      duplicate single-instance handling,
      reconfigure,
      and successful entry creation.

  dependency-transparency:
    status: exempt
    comment: |
      This integration has no external Python package dependencies.

  docs-high-level-description:
    status: done

  docs-installation-instructions:
    status: done

  docs-removal-instructions:
    status: done

  entity-event-setup:
    status: done

  entity-unique-id:
    status: done

  has-entity-name:
    status: done

  runtime-data:
    status: done

  test-before-configure:
    status: done

  test-before-setup:
    status: done

  test-coverage:
    status: todo

  # Silver
  action-exceptions:
    status: todo

  config-entry-unloading:
    status: done

  diagnostics:
    status: done

  docs-configuration-parameters:
    status: todo

  docs-installation-parameters:
    status: todo

  entity-unavailable:
    status: done

  integration-owner:
    status: done

  log-when-unavailable:
    status: done

  parallel-updates:
    status: done

  reauthentication-flow:
    status: exempt
    comment: |
      This integration has no authentication.

  repair-issues:
    status: done

  stale-devices:
    status: exempt
    comment: |
      Virtual Remote creates helper devices that are user-managed and not
      automatically discovered.

  strict-typing:
    status: done

  # Gold
  devices:
    status: done

  discovery-update-info:
    status: exempt
    comment: |
      This integration does not support automatic discovery.

  docs-examples:
    status: todo

  docs-known-limitations:
    status: todo

  docs-supported-functions:
    status: todo

  docs-troubleshooting:
    status: todo

  docs-use-cases:
    status: todo

  dynamic-devices:
    status: exempt
    comment: |
      Devices are fully user-managed through the config and options flows.

  entity-category:
    status: exempt
    comment: |
      This integration only provides primary remote entities.

  entity-disabled-by-default:
    status: exempt
    comment: |
      This integration only provides primary remote entities.

  entity-translations:
    status: todo

  exception-translations:
    status: done

  icon-translations:
    status: exempt
    comment: |
      This integration does not provide entities requiring icon translations.

  reconfiguration-flow:
    status: done

  translated-options-flow:
    status: done