rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not register any service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not register any service actions.
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  entity-event-setup:
    status: exempt
    comment: Entities poll through the coordinator and do not subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not register any service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: This integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: The device connection is unauthenticated; revisit when optional password (pwd=) support lands.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: The device is not discoverable, so there is no discovery data to update.
  discovery:
    status: exempt
    comment: >-
      The CCM15 is a local-polling hub configured by host/IP; it is not
      discoverable on the network (no mDNS/SSDP/DHCP).
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: done
  entity-category:
    status: exempt
    comment: The single climate entity does not need a non-default category.
  entity-device-class:
    status: exempt
    comment: The climate entity has no applicable device class.
  entity-disabled-by-default:
    status: exempt
    comment: Only primary climate entities are provided.
  entity-translations:
    status: exempt
    comment: The climate entity uses the device name; no entity names to translate.
  exception-translations:
    status: exempt
    comment: >-
      The integration raises no user-facing exceptions; the only failure path is
      an internal UpdateFailed from the coordinator.
  icon-translations:
    status: exempt
    comment: The integration uses default entity icons.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: This integration does not raise repairable issues.
  stale-devices: todo

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
