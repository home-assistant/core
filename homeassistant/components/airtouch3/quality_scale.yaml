rules:
  # Bronze
  action-setup:
    status: exempt
    comment: This integration does not define custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not define custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: This integration does not subscribe to external events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not define custom actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: AirTouch 3 controllers do not require authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Zone topology is configured on the controller and loaded during setup.
  entity-category:
    status: exempt
    comment: Climate entities represent the primary controls for the device.
  entity-device-class:
    status: exempt
    comment: Climate entities do not have device classes.
  entity-disabled-by-default:
    status: exempt
    comment: All entities provide primary climate controls and should be enabled.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No known repairable issues.
  stale-devices:
    status: exempt
    comment: Zone topology is static for a config entry until the entry is reloaded.
