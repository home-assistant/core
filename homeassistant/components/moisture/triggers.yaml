.trigger_common_fields: &trigger_common_fields
  behavior: &trigger_behavior
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

.moisture_threshold_entity: &moisture_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: moisture

.moisture_threshold_number: &moisture_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

.trigger_binary_target: &trigger_binary_target
  entity:
    - domain: binary_sensor
      device_class: moisture

.trigger_numerical_target: &trigger_numerical_target
  entity:
    - domain: sensor
      device_class: moisture

detected:
  fields: *trigger_common_fields
  target: *trigger_binary_target

cleared:
  fields: *trigger_common_fields
  target: *trigger_binary_target

changed:
  target: *trigger_numerical_target
  fields:
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *moisture_threshold_entity
          mode: changed
          number: *moisture_threshold_number

crossed_threshold:
  target: *trigger_numerical_target
  fields:
    behavior: *trigger_behavior
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *moisture_threshold_entity
          mode: crossed
          number: *moisture_threshold_number
