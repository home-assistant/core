config_entry:
  versions:
    - version:
        major: 1
        minor: 1
      data:
        fields:
          filter:
            required: true
            selector:
              text: {}
          mode:
            required: true
            selector:
              text: {}
      options:
        fields:
          camera_audio:
            required: false
            selector:
              entity:
                multiple: true
          camera_copy:
            required: false
            selector:
              entity:
                multiple: true
          include_exclude_mode:
            required: true
            selector:
              select:
                options:
                  - exclude
                  - include
          mode:
            required: true
            selector:
              select:
                options: []
  subentries: {}
