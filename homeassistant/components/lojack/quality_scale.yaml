  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  config-entry-unloading: done
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow: done
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: This is a cloud polling integration with no local discovery mechanism.
  discovery-update-info:
    status: exempt
    comment: This is a cloud polling integration with no local discovery mechanism.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Vehicles are tied to the user account. Changes require integration reload.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No user-actionable repair scenarios beyond reauthentication, which is already handled.
  stale-devices:
    status: exempt
    comment: Vehicles removed from the LoJack account stop appearing in API responses and become unavailable.

  # Platinum
  async-dependency: done
  inject-websession: todo
  strict-typing: todo
