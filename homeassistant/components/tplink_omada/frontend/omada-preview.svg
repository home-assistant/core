<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f172a"/>

  <!-- Internet cloud -->
  <ellipse cx="200" cy="32" rx="54" ry="20" fill="#1e3a5f"/>
  <ellipse cx="174" cy="36" rx="34" ry="18" fill="#1e3a5f"/>
  <ellipse cx="226" cy="36" rx="34" ry="18" fill="#1e3a5f"/>
  <ellipse cx="200" cy="44" rx="56" ry="16" fill="#1e40af"/>
  <text x="200" y="47" fill="#93c5fd" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Internet</text>

  <!-- Internet to router -->
  <line x1="200" y1="56" x2="200" y2="98" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Router -->
  <rect x="144" y="98" width="112" height="42" fill="#1d4ed8" rx="7"/>
  <rect x="152" y="108" width="96" height="6" fill="#93c5fd" rx="2" opacity="0.5"/>
  <rect x="152" y="118" width="20" height="6" fill="#22c55e" rx="2"/>
  <rect x="178" y="118" width="20" height="6" fill="#22c55e" rx="2"/>
  <rect x="204" y="118" width="20" height="6" fill="#f59e0b" rx="2"/>
  <rect x="230" y="118" width="10" height="6" fill="#ef4444" rx="2"/>
  <text x="200" y="153" fill="#bfdbfe" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="bold">ER605 Router</text>

  <!-- Router to switch -->
  <line x1="200" y1="140" x2="200" y2="180" stroke="#60a5fa" stroke-width="2"/>

  <!-- Switch -->
  <rect x="110" y="180" width="180" height="42" fill="#075985" rx="7"/>
  <text x="200" y="195" fill="#bae6fd" font-family="sans-serif" font-size="11" text-anchor="middle">Switch</text>
  <!-- Port LEDs -->
  <rect x="120" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="132" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="144" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="156" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="168" y="200" width="7" height="7" fill="#f59e0b" rx="1"/>
  <rect x="180" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="192" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="204" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="216" y="200" width="7" height="7" fill="#94a3b8" rx="1"/>
  <rect x="228" y="200" width="7" height="7" fill="#94a3b8" rx="1"/>
  <rect x="240" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="252" y="200" width="7" height="7" fill="#22c55e" rx="1"/>
  <rect x="264" y="200" width="7" height="7" fill="#94a3b8" rx="1"/>
  <rect x="276" y="200" width="7" height="7" fill="#22c55e" rx="1"/>

  <!-- Switch to APs -->
  <line x1="145" y1="222" x2="80" y2="258" stroke="#60a5fa" stroke-width="2"/>
  <line x1="200" y1="222" x2="200" y2="258" stroke="#60a5fa" stroke-width="2"/>
  <line x1="255" y1="222" x2="320" y2="258" stroke="#60a5fa" stroke-width="2"/>

  <!-- AP 1 -->
  <rect x="44" y="258" width="72" height="36" fill="#4c1d95" rx="6"/>
  <!-- WiFi arcs AP1 -->
  <path d="M60 279 Q80 262 100 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <path d="M66 279 Q80 268 94 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <circle cx="80" cy="279" r="2" fill="#c4b5fd"/>
  <text x="80" y="292" fill="#ddd6fe" font-family="sans-serif" font-size="10" text-anchor="middle">AP</text>

  <!-- AP 2 -->
  <rect x="164" y="258" width="72" height="36" fill="#4c1d95" rx="6"/>
  <path d="M180 279 Q200 262 220 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <path d="M186 279 Q200 268 214 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <circle cx="200" cy="279" r="2" fill="#c4b5fd"/>
  <text x="200" y="292" fill="#ddd6fe" font-family="sans-serif" font-size="10" text-anchor="middle">AP</text>

  <!-- AP 3 -->
  <rect x="284" y="258" width="72" height="36" fill="#4c1d95" rx="6"/>
  <path d="M300 279 Q320 262 340 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <path d="M306 279 Q320 268 334 279" stroke="#c4b5fd" stroke-width="2" fill="none"/>
  <circle cx="320" cy="279" r="2" fill="#c4b5fd"/>
  <text x="320" y="292" fill="#ddd6fe" font-family="sans-serif" font-size="10" text-anchor="middle">AP</text>

  <!-- TP-Link Omada label -->
  <text x="200" y="14" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle">TP-Link Omada Network</text>
</svg>
