rules:
  # Bronze
  action-setup:
    status: exempt
    comment: There are no custom actions
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: There are no custom actions
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  entity-event-setup:
    status: exempt
    comment: Subscriptions are handled by the PassiveBluetoothProcessorEntity base class.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: Presence is confirmed by the discovered advertisement
  test-before-setup:
    status: exempt
    comment: Sleepy device that may not be advertising at setup time
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: There are no custom actions
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: There are no configuration parameters
  docs-installation-parameters:
    status: exempt
    comment: There are no installation parameters
  entity-unavailable:
    status: done
    comment: |
      Availability is provided by the passive bluetooth coordinator. These are
      sleepy devices, so once seen the entities use assumed_state rather than
      becoming unavailable.
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: Handled by the passive bluetooth coordinator.
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: This integration does not require authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: This integration uses Bluetooth and addresses don't change.
  discovery: done
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: done
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow:
    status: exempt
    comment: The integration does not have anything to reconfigure.
  repair-issues:
    status: exempt
    comment: This integration does not have any known issues that require repair.
  stale-devices:
    status: exempt
    comment: This integration has a fixed single device.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: This integration used a Bluetooth connection, and no web sessions.
  strict-typing: done
