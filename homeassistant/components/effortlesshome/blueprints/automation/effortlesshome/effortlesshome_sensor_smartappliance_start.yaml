blueprint:
  name: Smart Appliance Sensor Conversion Start Automation
  description: Set the start run action(s) to take to convert a dumb appliance to smart
  domain: automation
  author: EffortlessHome
  input:
    sensor:
      name: Sensor
      description:
        The sensor attached to the appliance. Typically
        a vibration, door or temperature sensor.
      selector:
        entity:
          filter:
            - domain:
                - sensor
                - binary_sensor
          multiple: false

    trigger_on_minutes:
      description: The amount of time in minutes to trigger the running state
      name: Trigger Time
      default: 5
      selector:
        number:
          min: 1.0
          max: 99.0
          unit_of_measurement: minutes
          step: 1.0
          mode: slider
          
    appliance_switch:
      name: Dedicated appliance switch
      description: Use one of the defined Appliance Switches to convert the appliance to smart.
      default: switch.smartappliance1
      selector:
        entity:
          domain:
            - switch
          multiple: false

    notification_message:
      name: Notification message
      description: "Default: Appliance Started"
      default: Appliance Started
    additional_actions:
      name: Additional Actions
      description: Add additional actions to execute (Optional)
      default: []
      selector:
        action: {}

trigger:
  platform: state
  entity_id: !input sensor
  to: "on"
  for:
    hours: 0
    minutes: !input trigger_on_minutes
    seconds: 0

condition:
  - condition: state
    entity_id: !input appliance_switch
    state: "off"

action:
  - service: notify.effortlesshome
    data:
      title: !input notification_message
      message: !input notification_message

  - action: switch.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: !input appliance_switch

  - choose: []
    default: !input additional_actions
