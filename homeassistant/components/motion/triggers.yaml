.trigger_common_fields: &trigger_common_fields
  behavior:
    required: true
    default: any
    selector:
      automation_behavior:
        translation_key: trigger_behavior
        behavior:
          - first
          - last
          - any
  for:
    required: true
    default: 00:00:00
    selector:
      duration:

detected:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: motion

cleared:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: motion
