rules:
  # --- Bronze ---
  action-setup:
    status: exempt
    comment: The integration does not register any global service actions.
  appropriate-polling:
    status: done
    comment: DataUpdateCoordinator polls every 30 seconds (BLE/MQTT/HTTP).
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency:
    status: done
    comment: >-
      The WyBot client is the pywybot PyPI package (github.com/bassrock/pywybot),
      pinned in manifest requirements.
  docs-actions:
    status: exempt
    comment: No service actions are provided.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: The integration provides no triggers.
  docs-conditions:
    status: exempt
    comment: The integration provides no conditions.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # --- Silver ---
  action-exceptions:
    status: done
    comment: Vacuum entity actions raise HomeAssistantError on failure.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: >-
      _async_update_data raises UpdateFailed when no data is available, so the
      DataUpdateCoordinator logs once on failure and once on recovery.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # --- Gold ---
  devices: todo
  diagnostics: todo
  discovery: todo
  discovery-update-info: todo
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: todo
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices: todo

  # --- Platinum ---
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
