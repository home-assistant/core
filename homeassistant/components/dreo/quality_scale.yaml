rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide additional actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities use a DataUpdateCoordinator and do not subscribe directly to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: This integration does not provide additional service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: This integration does not provide YAML configuration or an options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: todo
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: This cloud integration does not support discovery.
  discovery-update-info:
    status: exempt
    comment: This cloud integration does not support discovery.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category:
    status: exempt
    comment: This integration does not expose entities with an entity category.
  entity-device-class:
    status: exempt
    comment: Fan entities do not expose a device class.
  entity-disabled-by-default:
    status: exempt
    comment: This integration only exposes the primary fan entity.
  entity-translations:
    status: exempt
    comment: The integration does not provide entity-specific translation keys.
  exception-translations: done
  icon-translations:
    status: exempt
    comment: This integration does not provide icon translations.
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices: todo

  # Platinum
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
