set_window_open:
  fields:
    device_id:
      required: true
      selector:
        device:
          entity:
            integration: fritzbox
            domain: climate
    duration:
      default: 600
      required: true
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: seconds

set_window_close:
  fields:
    device_id:
      required: true
      selector:
        device:
          entity:
            integration: fritzbox
            domain: climate
