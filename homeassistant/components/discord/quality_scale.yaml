rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: The integration is push-based (cloud_push). No polling.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities do not subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable:
    status: exempt
    comment: Notify entities are push-only; no data is fetched.
  integration-owner: done
  log-when-unavailable:
    status: exempt
    comment: Notify entities are push-only; no data is fetched.
  parallel-updates:
    status: exempt
    comment: PARALLEL_UPDATES = 0 is set; push-only entities require no coordinator.
  reauthentication-flow: done
  test-coverage: done
