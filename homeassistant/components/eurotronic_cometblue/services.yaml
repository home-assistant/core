set_holiday:
  target:
    entity:
      domain: climate
      integration: eurotronic_cometblue
  fields:
    start:
      example: 2023-12-24 17:00:00
      required: true
      selector:
        datetime:
    end:
      example: 2023-12-31 23:30:00
      required: true
      selector:
        datetime:
    temperature:
      example: 20
      required: true
      selector:
        number:
          min: 8
          max: 28
          step: 0.5
          unit_of_measurement: °C
