.target_selector: &target_selector
  entity:
    domain: climate
    integration: eurotronic_cometblue

.day_field: &day_field
  example: |
    start1: 07:00:00
    end1: 09:00:00
    start2: 10:00:00
    end2: 12:00:00
    start3: 13:00:00
    end3: 17:00:00
    start4: 20:00:00
    end4: 23:00:00
  required: false
  selector:
    object:

set_datetime:
  target: *target_selector
  fields:
    datetime:
      selector:
        datetime:

get_schedule:
  target: *target_selector

set_schedule:
  target: *target_selector
  fields:
    monday: *day_field
    tuesday: *day_field
    wednesday: *day_field
    thursday: *day_field
    friday:
      example: "{}"
      required: false
      selector:
        object:
    saturday:
      example: |
        start1: 09:00:00
        end1: 12:00:00
        start2: 17:00:00
        end2: 19:00:00
      required: false
      selector:
        object:
    sunday: *day_field

set_holiday:
  target:
    entity:
      domain: climate
      integration: eurotronic_cometblue
  fields:
    start:
      example: 2023-12-24
      required: true
      selector:
        datetime:
    end:
      example: 2023-12-31
      required: true
      selector:
        datetime:
    temperature:
      example: 20
      required: true
      selector:
        number:
          min: 8
          max: 28
          step: 0.5
          unit_of_measurement: °C
