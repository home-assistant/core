# Fritz!Box VPN services

remove_unavailable_entities:
  name: Remove unavailable entities
  description: Remove entity registry entries for VPN connections that no longer exist on the Fritz!Box, then reload the integration. Optional config_entry_id limits the operation to that integration entry.
  fields:
    config_entry_id:
      name: Config entry ID
      description: Optional. Limit cleanup to this integration entry (e.g. from the integration's three-dot menu > Configure, the ID is in the URL). If omitted, all Fritz!Box VPN entries are processed.
      required: false
      selector:
        text:

repair_entity_id_suffixes:
  name: Repair entity ID suffixes
  description: Fix entity IDs that got a _2, _3, _4 suffix after faulty deactivation/reactivation. Removes the stale base entry and renames the suffixed entity to the base ID (e.g. switch.xyz_2 → switch.xyz). Optional config_entry_id limits to one entry.
  fields:
    config_entry_id:
      name: Config entry ID
      description: Optional. Limit repair to this integration entry. If omitted, all Fritz!Box VPN entries are processed.
      required: false
      selector:
        text:
