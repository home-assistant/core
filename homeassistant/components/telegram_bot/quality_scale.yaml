rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: |
      The integration provides webhooks (push based), polling (long polling) and broadcast (no data fetching) platforms which do not have interval polling.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable:
    status: exempt
    comment: |
      There are no entities that fetch data.
  integration-owner: done
  log-when-unavailable:
    status: exempt
    comment: |
      There are no entities that fetch data.
  parallel-updates:
    status: exempt
    comment: |
      There are no entities that fetch data.
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: the service cannot be discovered
  discovery:
    status: exempt
    comment: the service cannot be discovered
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: the integration is a service
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: There is always one device per config entry.
  entity-category:
    status: exempt
    comment: Entities do not require a specific category.
  entity-device-class:
    status: exempt
    comment: Entities do not have a specific device class.
  entity-disabled-by-default:
    status: exempt
    comment: No noisy/non-essential entities.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: Integration does not raise repair issues.
  stale-devices:
    status: exempt
    comment: only one device per entry, is deleted with the entry.

  # Platinum
  async-dependency: done
  inject-websession: todo
  strict-typing: done
