.trigger_common: &trigger_common
  target: &trigger_climate_target
    entity:
      domain: climate
  fields:
    behavior: &trigger_behavior
      required: true
      default: any
      selector:
        select:
          translation_key: trigger_behavior
          options:
            - first
            - last
            - any

.humidity_threshold_entity: &humidity_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: humidity
  - domain: number
    device_class: humidity

.humidity_threshold_number: &humidity_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

.temperature_units: &temperature_units
  - "°C"
  - "°F"

.temperature_threshold_entity: &temperature_threshold_entity
  - domain: input_number
    unit_of_measurement: *temperature_units
  - domain: sensor
    device_class: temperature
  - domain: number
    device_class: temperature

started_cooling: *trigger_common
started_drying: *trigger_common
started_heating: *trigger_common
turned_off: *trigger_common
turned_on: *trigger_common

hvac_mode_changed:
  target: *trigger_climate_target
  fields:
    behavior: *trigger_behavior
    hvac_mode:
      context:
        filter_target: target
      required: true
      selector:
        state:
          hide_states:
            - unavailable
            - unknown
          multiple: true

target_humidity_changed:
  target: *trigger_climate_target
  fields:
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: changed
          number: *humidity_threshold_number

target_humidity_crossed_threshold:
  target: *trigger_climate_target
  fields:
    behavior: *trigger_behavior
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: crossed
          number: *humidity_threshold_number

target_temperature_changed:
  target: *trigger_climate_target
  fields:
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *temperature_threshold_entity
          mode: changed
          number:
            mode: box
          unit_of_measurement: *temperature_units

target_temperature_crossed_threshold:
  target: *trigger_climate_target
  fields:
    behavior: *trigger_behavior
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *temperature_threshold_entity
          mode: crossed
          number:
            mode: box
          unit_of_measurement: *temperature_units
