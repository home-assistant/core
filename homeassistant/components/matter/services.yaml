water_heater_boost:
  target:
    entity:
      domain: water_heater
      integration: matter
  fields:
    duration:
      selector:
        number:
          min: 60
          max: 14400
          step: 60
          mode: box
      default: 3600
      required: true
    emergency_boost:
      selector:
        boolean:
      default: false
    temporary_setpoint:
      selector:
        number:
          min: 30
          max: 65
          step: 1
          mode: slider
      default: 65

set_lock_usercode:
  target:
    entity:
      domain: lock
      integration: matter
  fields:
    code_slot:
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: box
      required: true
    usercode:
      selector:
        text:
      required: true

clear_lock_usercode:
  target:
    entity:
      domain: lock
      integration: matter
  fields:
    code_slot:
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: box
      required: true

set_lock_user:
  target:
    entity:
      domain: lock
      integration: matter
  fields:
    user_index:
      selector:
        number:
          min: 1
          max: 255
          step: 1
          mode: box
    user_name:
      selector:
        text:
    user_type:
      selector:
        select:
          options:
            - unrestricted_user
            - year_day_schedule_user
            - week_day_schedule_user
            - programming_user
            - non_access_user
            - forced_user
            - disposable_user
            - expiring_user
            - schedule_restricted_user
            - remote_only_user
      default: unrestricted_user
    credential_rule:
      selector:
        select:
          options:
            - single
            - dual
            - tri
      default: single
    pin_code:
      selector:
        text:

clear_lock_user:
  target:
    entity:
      domain: lock
      integration: matter
  fields:
    user_index:
      selector:
        number:
          min: 1
          max: 65534
          step: 1
          mode: box
      required: true

get_lock_info:
  target:
    entity:
      domain: lock
      integration: matter

get_lock_users:
  target:
    entity:
      domain: lock
      integration: matter
