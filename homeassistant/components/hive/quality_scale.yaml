rules:
  # Bronze
  action-setup:
    status: exempt
    comment: >
      Service actions are entity platform services registered via
      `entity_platform.async_register_entity_service()`, which is inherently
      tied to the entity platform lifecycle and cannot be pre-registered in
      `async_setup`. No integration-level `hass.services.async_register` calls
      exist.
  appropriate-polling:
    status: done
    comment: >
      Entity polling reads data from the local cache maintained by the
      `pyhive-integration` library, regardless of the configured
      `scan_interval` (15 seconds by default). Actual cloud API calls are
      rate-limited to a minimum of 2 minutes by the library's built-in
      update interval, so no excessive API requests are made.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: todo
  config-entry-unloading: todo
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: todo
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow: todo
  test-coverage: todo

  # Gold
  devices: todo
  diagnostics: todo
  discovery: todo
  discovery-update-info: todo
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: todo
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices: todo

  # Platinum
  async-dependency: todo
  inject-websession: todo
  strict-typing: todo
