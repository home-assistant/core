.trigger_common_fields:
  behavior: &trigger_behavior
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

.humidity_threshold_entity: &humidity_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: humidity
  - domain: number
    device_class: humidity

.humidity_threshold_number: &humidity_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

.trigger_target: &trigger_target
  entity:
    - domain: sensor
      device_class: humidity
    - domain: climate
    - domain: humidifier
    - domain: weather

changed:
  target: *trigger_target
  fields:
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: changed
          number: *humidity_threshold_number

crossed_threshold:
  target: *trigger_target
  fields:
    behavior: *trigger_behavior
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: crossed
          number: *humidity_threshold_number
