.humidity_threshold_entity: &humidity_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: humidity
  - domain: number
    device_class: humidity

.humidity_threshold_number: &humidity_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

is_value:
  target:
    entity:
      - domain: sensor
        device_class: humidity
      - domain: climate
      - domain: humidifier
      - domain: weather
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          translation_key: condition_behavior
          mode: condition
    above: *number_or_entity
    below: *number_or_entity
