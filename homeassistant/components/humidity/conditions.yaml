.number_or_entity: &number_or_entity
  required: false
  selector:
    choose:
      choices:
        number:
          selector:
            number:
              mode: box
              unit_of_measurement: "%"
        entity:
          selector:
            entity:
              filter:
                - domain: input_number
                  unit_of_measurement: "%"
                - domain: number
                  device_class: humidity
                - domain: sensor
                  device_class: humidity
      translation_key: number_or_entity

value:
  target:
    entity:
      - domain: sensor
        device_class: humidity
      - domain: number
        device_class: humidity
      - domain: climate
      - domain: humidifier
  fields:
    behavior:
      required: true
      default: any
      selector:
        select:
          translation_key: condition_behavior
          options:
            - all
            - any
    above: *number_or_entity
    below: *number_or_entity
