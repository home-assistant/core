rules:
  # Bronze
  action-setup: done          # No custom HA actions defined — rule is not applicable
  appropriate-polling: done   # DataUpdateCoordinator with UPDATE_INTERVAL used
  brands: done                # icon.png / logo.png etc. present in component folder
  common-modules: done        # coordinator.py used for polling; const.py holds config entry keys
  config-flow-test-coverage: done
  config-flow: done           # Full ConfigFlow with error handling implemented
  dependency-transparency: done  # blanco-smart-home-api-client published on PyPI (source distribution)
  docs-actions: done          # No custom actions defined — nothing to document
  docs-high-level-description: done  # README has high-level description
  docs-installation-instructions: done  # README has installation section
  docs-removal-instructions: done   # README has dedicated removal section with UI steps
  entity-event-setup: done    # CoordinatorEntity used — no direct event subscriptions
  entity-unique-id: done      # _attr_unique_id set on all entities
  has-entity-name: done       # _attr_has_entity_name = True in both platforms
  runtime-data: done          # entry.runtime_data = coordinator
  test-before-configure: done # validate_input() tests API before creating config entry
  test-before-setup: done     # async_config_entry_first_refresh() raises ConfigEntryNotReady
  unique-config-entry: done   # async_set_unique_id + _abort_if_unique_id_configured

  # Silver
  action-exceptions: done     # No custom actions defined — rule is not applicable
  config-entry-unloading: done  # async_unload_entry implemented
  docs-configuration-parameters: done  # README documents serial number and service code
  docs-installation-parameters: done   # README documents installation parameters
  entity-unavailable: done    # CoordinatorEntity marks entities unavailable on coordinator failure
  integration-owner: done     # codeowners set in manifest.json
  log-when-unavailable: done  # Warnings logged per endpoint when requests fail
  parallel-updates: done      # PARALLEL_UPDATES = 0 defined in sensor.py
  reauthentication-flow: done  # async_step_reauth + async_step_reauth_confirm implemented; ConfigEntryAuthFailed raised on token renewal failure
  test-coverage: done  # test_coordinator.py, test_sensor.py added; reauth tests added to test_config_flow.py

  # Gold
  devices: done               # DeviceInfo with identifiers, manufacturer, model, serial, versions
  diagnostics: done           # diagnostics.py implemented with token/app_id/dev_id redaction
  discovery-update-info: todo  # Cloud polling only — local discovery not applicable
  discovery: todo             # Cloud polling only — local discovery not applicable
  docs-data-update: done      # README documents polling interval and all API endpoints
  docs-examples: done         # samples/dashboard.yaml provided
  docs-known-limitations: done  # README has Known Limitations section
  docs-supported-devices: done  # README has Supported Devices table
  docs-supported-functions: done  # README has Available Entities section
  docs-troubleshooting: done  # README has Troubleshooting section
  docs-use-cases: done        # README has Use Cases section
  dynamic-devices: done       # One device per config entry by design — not applicable
  entity-category: done       # No diagnostic-only entities; all entities are user-facing
  entity-device-class: done   # Device classes set on all relevant sensor/binary sensor entities
  entity-disabled-by-default: done  # All entities are user-facing; none warrants disabling by default
  entity-translations: done   # translation_key set on all entities
  exception-translations: done  # All error keys mapped in strings.json and translations/
  icon-translations: done
  reconfiguration-flow: done  # async_step_reconfigure implemented in config_flow.py
  repair-issues: done         # Repair issue created/deleted per poll cycle in coordinator.py
  stale-devices: done         # One device per config entry — stale device cleanup not applicable

  # Platinum
  async-dependency: done      # All HTTP I/O uses aiohttp (async)
  inject-websession: done     # async_get_clientsession(hass) used throughout
  strict-typing: done         # mypy.ini with strict=true added; all functions fully annotated
