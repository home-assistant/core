rules:
  # Bronze
  action-setup:
    status: exempt
    comment: No custom actions
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No custom actions
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: No events
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No custom actions
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: No authentication
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: Unable to perform discovery on this type of device
  discovery:
    status: exempt
    comment: Unable to perform discovery on this type of device
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: This integration represents a single statically configured serial device.
  entity-category: todo
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: No entities that should be disabled by default
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No issues can come up that require a repair flow. Reconfiguration is sufficient.
  stale-devices:
    status: exempt
    comment: No devices can become stale as they are not discoverable.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: The underlying library uses serialx, not aiohttp/httpx, for communication.
  strict-typing: todo
