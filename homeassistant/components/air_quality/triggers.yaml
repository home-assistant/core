        - "ppb"
        - "ppm"
        - "μg/m³"

.unit_no2: &unit_no2
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"
        - "μg/m³"

.unit_no: &unit_no
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "μg/m³"

.unit_so2: &unit_so2
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "μg/m³"

.unit_voc: &unit_voc
  required: false
  selector:
    select:
      options:
        - "μg/m³"
        - "mg/m³"

.unit_voc_ratio: &unit_voc_ratio
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"

.trigger_threshold_type: &trigger_threshold_type
  required: true
  default: above
  selector:
    select:
      options:
        - above
        - below
        - between
        - outside
      translation_key: trigger_threshold_type

# Binary sensor detected/cleared trigger fields
.trigger_binary_fields: &trigger_binary_fields
  behavior: *trigger_behavior

# --- Binary sensor targets ---

.target_gas: &target_gas
  entity:
    - domain: binary_sensor
      device_class: gas

.target_co_binary: &target_co_binary
  entity:
    - domain: binary_sensor
      device_class: carbon_monoxide

.target_smoke: &target_smoke
  entity:
    - domain: binary_sensor
      device_class: smoke

# --- Sensor targets ---

.target_co_sensor: &target_co_sensor
  entity:
    - domain: sensor
      device_class: carbon_monoxide

.target_co2: &target_co2
  entity:
    - domain: sensor
      device_class: carbon_dioxide

.target_pm1: &target_pm1
  entity:
    - domain: sensor
      device_class: pm1

.target_pm25: &target_pm25
  entity:
    - domain: sensor
      device_class: pm25

.target_pm4: &target_pm4
  entity:
    - domain: sensor
      device_class: pm4

.target_pm10: &target_pm10
  entity:
    - domain: sensor
      device_class: pm10

.target_ozone: &target_ozone
  entity:
    - domain: sensor
      device_class: ozone

.target_voc: &target_voc
  entity:
    - domain: sensor
      device_class: volatile_organic_compounds

.target_voc_ratio: &target_voc_ratio
  entity:
    - domain: sensor
      device_class: volatile_organic_compounds_parts

.target_no: &target_no
  entity:
    - domain: sensor
      device_class: nitrogen_monoxide

.target_no2: &target_no2
  entity:
    - domain: sensor
      device_class: nitrogen_dioxide

.target_n2o: &target_n2o
  entity:
    - domain: sensor
      device_class: nitrous_oxide

.target_so2: &target_so2
  entity:
    - domain: sensor
      device_class: sulphur_dioxide

# --- Binary sensor triggers ---

gas_detected:
  fields: *trigger_binary_fields
  target: *target_gas

gas_cleared:
  fields: *trigger_binary_fields
  target: *target_gas

co_detected:
  fields: *trigger_binary_fields
  target: *target_co_binary

co_cleared:
  fields: *trigger_binary_fields
  target: *target_co_binary

smoke_detected:
  fields: *trigger_binary_fields
  target: *target_smoke

smoke_cleared:
  fields: *trigger_binary_fields
  target: *target_smoke

# --- Numerical sensor triggers ---

co_changed:
  target: *target_co_sensor
  fields:
    above: *number_or_entity_co
    below: *number_or_entity_co
    unit: *unit_co

co_crossed_threshold:
  target: *target_co_sensor
  fields:
    behavior: *trigger_behavior
    threshold_type: *trigger_threshold_type
    lower_limit: *number_or_entity_co
    upper_limit: *number_or_entity_co
    unit: *unit_co

co2_changed:
  target: *target_co2
  fields:
    above: *number_or_entity_co2
