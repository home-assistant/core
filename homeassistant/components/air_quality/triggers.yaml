.trigger_common_fields:
  behavior: &trigger_behavior
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

.number_or_entity_co: &number_or_entity_co
  required: false
  selector:
    choose:
      choices:
        number:
          selector:
            number:
              mode: box
        entity:
          selector:
            entity:
              filter:
                - domain: input_number
                  unit_of_measurement:
                    - "ppb"
                    - "ppm"
                    - "mg/m³"
                    - "μg/m³"
                - domain: sensor
                  device_class: carbon_monoxide
                - domain: number
                  device_class: carbon_monoxide
      translation_key: number_or_entity

.number_or_entity_co2: &number_or_entity_co2
  required: false
  selector:
