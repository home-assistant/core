  fields:
    behavior: *condition_behavior
    above: *number_or_entity_so2
    below: *number_or_entity_so2
    unit: *unit_so2

# --- Numerical sensor conditions without unit conversion ---

is_co2_value:
  target: *target_co2
  fields:
