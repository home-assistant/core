# --- Unit selectors ---

.unit_co: &unit_co
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"
        - "mg/m³"
        - "μg/m³"

.unit_ozone: &unit_ozone
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"
        - "μg/m³"

.unit_no2: &unit_no2
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"
        - "μg/m³"

.unit_no: &unit_no
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "μg/m³"

.unit_so2: &unit_so2
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "μg/m³"

.unit_voc: &unit_voc
  required: false
  selector:
    select:
      options:
        - "μg/m³"
        - "mg/m³"

.unit_voc_ratio: &unit_voc_ratio
  required: false
  selector:
    select:
      options:
        - "ppb"
        - "ppm"

# --- Binary sensor targets ---

.target_gas: &target_gas
  entity:
    - domain: binary_sensor
      device_class: gas

.target_co_binary: &target_co_binary
  entity:
    - domain: binary_sensor
      device_class: carbon_monoxide

.target_smoke: &target_smoke
  entity:
    - domain: binary_sensor
      device_class: smoke

# --- Sensor targets ---

.target_co_sensor: &target_co_sensor
  entity:
    - domain: sensor
      device_class: carbon_monoxide

.target_co2: &target_co2
  entity:
    - domain: sensor
      device_class: carbon_dioxide

.target_pm1: &target_pm1
  entity:
    - domain: sensor
      device_class: pm1

.target_pm25: &target_pm25
  entity:
    - domain: sensor
      device_class: pm25

.target_pm4: &target_pm4
  entity:
    - domain: sensor
      device_class: pm4

.target_pm10: &target_pm10
  entity:
    - domain: sensor
      device_class: pm10

.target_ozone: &target_ozone
  entity:
    - domain: sensor
      device_class: ozone

.target_voc: &target_voc
  entity:
    - domain: sensor
      device_class: volatile_organic_compounds

.target_voc_ratio: &target_voc_ratio
  entity:
    - domain: sensor
      device_class: volatile_organic_compounds_parts

.target_no: &target_no
  entity:
    - domain: sensor
      device_class: nitrogen_monoxide

.target_no2: &target_no2
  entity:
    - domain: sensor
      device_class: nitrogen_dioxide

.target_n2o: &target_n2o
  entity:
    - domain: sensor
      device_class: nitrous_oxide

.target_so2: &target_so2
  entity:
    - domain: sensor
      device_class: sulphur_dioxide

# --- Binary sensor conditions ---

.condition_binary_common: &condition_binary_common
  fields:
    behavior: *condition_behavior

is_gas_detected:
  <<: *condition_binary_common
  target: *target_gas

is_gas_cleared:
  <<: *condition_binary_common
  target: *target_gas

is_co_detected:
  <<: *condition_binary_common
  target: *target_co_binary

is_co_cleared:
  <<: *condition_binary_common
  target: *target_co_binary

is_smoke_detected:
  <<: *condition_binary_common
  target: *target_smoke

is_smoke_cleared:
  <<: *condition_binary_common
  target: *target_smoke

# --- Numerical sensor conditions with unit conversion ---

is_co_value:
  target: *target_co_sensor
  fields:
    behavior: *condition_behavior
    above: *number_or_entity_co
    below: *number_or_entity_co
    unit: *unit_co

is_ozone_value:
  target: *target_ozone
  fields:
    behavior: *condition_behavior
    above: *number_or_entity_ozone
    below: *number_or_entity_ozone
    unit: *unit_ozone

is_voc_value:
  target: *target_voc
  fields:
    behavior: *condition_behavior
    above: *number_or_entity_voc
    below: *number_or_entity_voc
    unit: *unit_voc

is_voc_ratio_value:
  target: *target_voc_ratio
  fields:
    behavior: *condition_behavior
    above: *number_or_entity_voc_ratio
    below: *number_or_entity_voc_ratio
    unit: *unit_voc_ratio

is_no_value:
  target: *target_no
  fields:
    behavior: *condition_behavior
    above: *number_or_entity_no
    below: *number_or_entity_no
    unit: *unit_no

is_no2_value:
