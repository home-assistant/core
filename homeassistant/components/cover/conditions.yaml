.condition_common_fields: &condition_common_fields
  behavior:
    required: true
    default: any
    selector:
      select:
        translation_key: condition_behavior
        options:
          - all
          - any

awning_is_closed:
  fields: *condition_common_fields
  target:
    entity:
      - domain: cover
        device_class: awning

