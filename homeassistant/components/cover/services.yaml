# Describes the format for available cover services

open_cover:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.OPEN
  fields:
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

close_cover:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.CLOSE
  fields:
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

toggle:
  target:
    entity:
      domain: cover
      supported_features:
        - - cover.CoverEntityFeature.CLOSE
          - cover.CoverEntityFeature.OPEN

set_cover_position:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.SET_POSITION
  fields:
    position:
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

stop_cover:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.STOP

open_cover_tilt:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.OPEN_TILT
  fields:
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

close_cover_tilt:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.CLOSE_TILT
  fields:
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

toggle_cover_tilt:
  target:
    entity:
      domain: cover
      supported_features:
        - - cover.CoverEntityFeature.CLOSE_TILT
          - cover.CoverEntityFeature.OPEN_TILT

set_cover_tilt_position:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.SET_TILT_POSITION
  fields:
    tilt_position:
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    preset_mode:
      selector:
        text: {}
    speed:
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

stop_cover_tilt:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.STOP_TILT

set_cover_speed:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.SET_SPEED
  fields:
    speed:
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

set_cover_preset_mode:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.PRESET_MODE
  fields:
    preset_mode:
      required: true
      selector:
        text: {}
