.trigger_common_fields: &trigger_common_fields
  behavior:
    required: true
    default: any
    selector:
      select:
        translation_key: trigger_behavior
        options:
          - first
          - last
          - any

awning_closed:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: cover
        device_class: awning

awning_opened:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: cover
        device_class: awning

blind_closed:
