rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not use actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Integration has no authentication flow.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: Service cannot be discovered
  discovery:
    status: exempt
    comment: Service cannot be discovered
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Integration is a service
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Devices and entities are statically defined; integration does not create/remove devices dynamically.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: The integration doesn't have any configurable options.
  repair-issues:
    status: exempt
    comment: The integration doesn't have any repair cases.
  stale-devices: todo

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
