set_vicare_mode:
  target:
    entity:
      integration: vicare
      domain: climate
  fields:
    vicare_mode:
      required: true
      selector:
        select:
          options:
            - "dhw"
            - "dhwAndHeating"
            - "dhwAndHeatingCooling"
            - "forcedNormal"
            - "forcedReduced"
            - "heating"
            - "standby"

set_domestic_hot_water_circulation_schedule:
  target:
    entity:
      integration: vicare
      domain: water_heater
  fields:
    schedule:
      required: true
      selector:
        object:
