rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: todo
    comment: >-
      The brand/ folder was removed from this Core tree. Actual brand
      icons/logos must still be submitted to and accepted by the separate
      home-assistant/brands repo — has not happened yet.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: todo
    comment: >-
      test_config_flow.py covers: duplicate-abort, full auto-login flow,
      token-exchange failure, reauth. Missing: manual_login/manual_paste
      fallback flow and async_step_reconfigure — both exist in
      config_flow.py but have no dedicated test.
  dependency-transparency: done
  docs-actions: done
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  docs-high-level-description:
    status: todo
    comment: >-
      No page for this integration exists on home-assistant.io yet
      (manifest documentation URL is a placeholder, not a submitted/merged
      doc page). Applies to every docs-* rule in this file.
  docs-installation-instructions:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-removal-instructions:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-installation-parameters:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: >-
      144 test functions / 261 snapshots exist, but no coverage-percentage
      tool has actually been run against this tree this session (no
      .coveragerc / stored coverage report / CI run available to verify
      against). A previously-claimed "99%" figure could not be
      re-substantiated and is not carried forward without a fresh run.

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Bosch cloud is the source of truth; devices added via OAuth flow. No local discovery protocol applies.
  discovery-update-info:
    status: exempt
    comment: See discovery.
  docs-data-update:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-examples:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-known-limitations:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-supported-devices:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-supported-functions:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-troubleshooting:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  docs-use-cases:
    status: todo
    comment: No home-assistant.io docs page exists yet.
  dynamic-devices:
    status: todo
    comment: >-
      A camera removed from the Bosch account is cleaned up
      (dev_reg.async_remove_device), but a camera newly added to the
      account is not picked up at runtime — async_add_entities is only
      called once at platform setup, so a config entry reload is required.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations:
    status: todo
    comment: >-
      switch.py's privacy-mode-blocks-stream ServiceValidationError fixed
      this session (now uses translation_domain/translation_key). Two
      remaining raw f-string HomeAssistantError raises in camera.py
      (play_stream / async_handle_async_webrtc_offer, both "stream
      unavailable - privacy mode is ON") are still unfixed: camera.py has
      a pre-existing, unrelated ruff C901 complexity violation
      (_async_camera_image_impl, 50 > 25) that blocks this repo's
      pre-commit hook on ANY change to the file, so fixing these 2 sites
      needs that complexity debt paid down first, out of scope this
      session.
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession:
    status: todo
    comment: >-
      cloud_ssl.py builds its own aiohttp.ClientSession(connector=...)
      directly (cached in hass.data, closed on EVENT_HOMEASSISTANT_STOP)
      instead of going through
      homeassistant.helpers.aiohttp_client.async_create_clientsession(hass,
      ...), which is what this rule requires even for a pinned custom SSL
      context. Bypasses HA's own session/connector-pool bookkeeping.
  strict-typing:
    status: done
    comment: >-
      .strict-typing entry present; 0 mypy --strict errors attributable to
      homeassistant/components/bosch_shc_camera (re-verified 2026-07-15).
