rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: todo
    comment: >-
      The brand/ folder was removed from this Core tree. Actual brand
      icons/logos must still be submitted to and accepted by the separate
      home-assistant/brands repo — has not happened yet.
  common-modules: done
  config-flow: done
  config-flow-test-coverage:
    status: done
    comment: >-
      test_config_flow.py covers: duplicate-abort, full auto-login flow,
      token-exchange failure, reauth (auto-login). Also covers the
      manual_login/manual_paste fallback flow (SOURCE_USER success,
      invalid-redirect-URL error, token-exchange-failure error, the
      diagnostic_cloud_api_override field's valid/invalid paths, and
      manual_login entered via SOURCE_REAUTH), plus async_step_reconfigure
      via both the manual_login and auto_login paths — asserting the
      existing entry is updated in place (no duplicate entry created,
      options preserved) rather than a new one.
  dependency-transparency: done
  docs-actions: done
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  docs-high-level-description:
    status: todo
    comment: >-
      No page for this integration exists on home-assistant.io yet
      (manifest documentation URL is a placeholder, not a submitted/merged
      doc page). Applies to every docs-* rule in this file.
  docs-installation-instructions:
