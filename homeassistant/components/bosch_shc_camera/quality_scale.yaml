rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-conditions:
    status: exempt
    comment: This integration does not have any conditions.
  docs-triggers:
    status: exempt
    comment: This integration does not have any triggers.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: done
    comment: |
      99% line-coverage across 6023 tests / 53 source files (2026-07-13).
      All entity platforms at 100%: camera, image, switch, sensor, binary_sensor,
      light, number, select, button, update, config_flow, diagnostics,
      local_rcp, media_source, models, smb, cf_unbuffer, snapshot_store.
      Remaining misses (101 lines): __init__.py 21 (shutdown/error edges),
      recorder.py 22 (watch-loop daemon paths), switch.py 18, fcm.py 10,
      rcp.py 15, tls_proxy.py 8 (daemon-thread coverage tooling limit),
      shc.py 6, select.py 1.
      Bug-finding suites surfaced 17 production bugs across sprints
      (sentinel violations, race conditions, resource leaks, SSRF guards).

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Bosch cloud is the source of truth; devices added via OAuth flow. No local discovery applicable.
  discovery-update-info:
    status: exempt
    comment: See discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: done
  stale-devices: done

  # Platinum
  async-dependency:
    status: done
    comment: All requests imports removed; HTTP via aiohttp (auth_utils.async_digest_request) and stdlib urllib (sync cloud downloads). Verified 2026-05-12.
  inject-websession: done
  strict-typing:
    status: done
    comment: pyproject.toml mypy --strict configured; 0 errors across 24 source files (was 593 baseline). ~80 targeted # type: ignore for HA-stub gaps. Verified 2026-05-12.
