.trigger_common_fields: &trigger_common_fields
  behavior:
    required: true
    default: any
    selector:
      automation_behavior:
        translation_key: trigger_behavior
        mode: trigger

closed:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: door
      - domain: cover
        device_class: door

opened:
  fields: *trigger_common_fields
  target:
    entity:
      - domain: binary_sensor
        device_class: door
      - domain: cover
        device_class: door
