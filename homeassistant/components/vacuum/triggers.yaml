.trigger_common: &trigger_common
  target:
    entity:
      domain: vacuum
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          mode: trigger

docked: *trigger_common
errored: *trigger_common
paused_cleaning: *trigger_common
started_cleaning: *trigger_common
started_returning: *trigger_common
