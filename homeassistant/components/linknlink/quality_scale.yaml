rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration does not provide custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration does not provide custom actions.
  docs-conditions:
    status: exempt
    comment: The integration does not provide custom conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: The integration does not provide custom triggers.
  entity-event-setup:
    status: exempt
    comment: Entities do not explicitly subscribe to events.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration does not provide custom actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration does not provide an options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Local protocol authentication does not use user credentials and is renewed automatically.
  test-coverage: todo

  # Gold
  devices: done
  diagnostics: todo
  discovery-update-info: todo
  discovery: todo
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: todo
  dynamic-devices: todo
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: Entities use icons provided by their device classes.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: The integration does not raise repair issues.
  stale-devices:
    status: exempt
    comment: Each config entry represents one fixed gateway device.

  # Platinum
  async-dependency: done
  inject-websession:
    status: exempt
    comment: The integration communicates over UDP and does not use HTTP.
  strict-typing: done
