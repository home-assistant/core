move_cover:
  target:
    entity:
      domain: cover
      supported_features:
        - cover.CoverEntityFeature.SET_POSITION
        - cover.CoverEntityFeature.SET_TILT_POSITION
  fields:
    position:
      required: true
      example: 0
      default: 0
      selector:
        number:
          translation_key: "position"
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"
    tilt_position:
      required: false
      example: 0
      default: 0
      selector:
        number:
          translation_key: "tilt_position"
          min: -127
          max: 127
          mode: slider
          unit_of_measurement: "°"
