rules:
  # Bronze — hivi_speaker: SSDP discovery, hub, local HTTP (hivico), switch + DLNA media
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands:
    status: exempt
    comment: Brand assets are submitted via a separate PR to home-assistant/brands.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description:
    status: exempt
    comment: Documentation PR for home-assistant.io is submitted alongside or after Core PR.
  docs-installation-instructions:
    status: exempt
    comment: Documentation PR for home-assistant.io is submitted alongside or after Core PR.
  docs-removal-instructions:
    status: exempt
    comment: Documentation PR for home-assistant.io is submitted alongside or after Core PR.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: exempt
    comment: >-
      Hub stores HIVIDeviceManager in hass.data[DOMAIN][entry_id]; migration to
      ConfigEntry.runtime_data can follow in a later change.
  test-before-configure: done
  test-before-setup:
    status: exempt
    comment: >-
      Speakers are discovered asynchronously via SSDP after setup; there is no single
      fixed host to validate before the config entry is created.
  unique-config-entry: done
