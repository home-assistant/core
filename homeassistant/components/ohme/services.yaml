list_charge_slots:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: ohme
set_price_cap:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: ohme
    price_cap:
      required: true
      selector:
        number:
          min: 0
          mode: box
set_state_of_charge:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: ohme
    state_of_charge:
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider
