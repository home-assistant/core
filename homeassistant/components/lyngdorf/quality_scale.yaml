# Quality Scale - Bronze
#
# This file documents which quality scale rules are implemented by the Lyngdorf integration.
# The integration targets the Bronze quality scale tier.

rules:
  # Bronze tier rules (mandatory for all integrations with quality scale)
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands:
    status: exempt
    comment: Single integration brand, does not meet minimum requirement of two integrations.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
