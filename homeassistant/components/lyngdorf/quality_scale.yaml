rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: Integration does not register custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: Integration does not register custom actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: No options to configure.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Integration does not use authentication.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery: done
  discovery-update-info: todo
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Single device per config entry.
  entity-category:
    status: exempt
    comment: Media player entities do not need entity categories.
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: All entities are useful by default.
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: exempt
    comment: Media player uses default platform icons.
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No repair issues needed.
  stale-devices:
    status: exempt
    comment: Single device per config entry.

  # Platinum
  async-dependency: todo
  inject-websession:
    status: exempt
    comment: Integration uses local TCP, not HTTP.
  strict-typing: todo
