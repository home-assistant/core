rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration has no actions.
  appropriate-polling:
    status: done
    comment: Meraki data in this endpoint updates at most every five minutes.
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency:
    status: exempt
    comment: Integration uses built-in aiohttp and no external runtime dependency.
  docs-actions:
    status: exempt
    comment: The integration has no actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Meraki clients are polled.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration has no actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates:
    status: exempt
    comment: Coordinator-based update pattern is used.
  reauthentication-flow: todo
  test-coverage: todo

  # Gold
  devices: todo
  diagnostics: todo
  discovery: todo
  discovery-update-info: todo
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices: done
  entity-category:
    status: exempt
    comment: Device tracker entities do not use an entity category.
  entity-device-class:
    status: exempt
    comment: Device tracker entities do not have a device class.
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues: todo
  stale-devices: todo

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
