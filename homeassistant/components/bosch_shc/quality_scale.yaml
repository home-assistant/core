rules:
  # Bronze tier rules — full audit 2026-06-20 / updated 2026-06-22 against bosch_shc v0.4.108
  # Rule count (Bronze): 18 total  |  DONE: 17  |  TODO: 1 (brands)  |  N/A: 0

  # ── DONE ─────────────────────────────────────────────────────────────────────

  config-flow:
    status: done
    comment: >
      ConfigFlow subclass present in config_flow.py (domain=DOMAIN).
      Supports manual (async_step_user), zeroconf discovery
      (async_step_zeroconf), confirm-discovery, credentials, and reauth
      steps.  manifest.json has "config_flow": true.

  unique-config-entry:
    status: done
    comment: >
      config_flow.py:114 calls async_set_unique_id(info["unique_id"]) then
      _abort_if_unique_id_configured.  async_step_zeroconf:207 does the same.
      async_step_credentials:162 updates the existing entry on reauth via
      async_update_reload_and_abort instead of creating a duplicate.

  test-before-configure:
    status: done
    comment: >
      config_flow.py:create_credentials_and_validate (line 43) calls
      SHCRegisterClient.register() and SHCSession.authenticate() before
      creating the entry.  SHCAuthenticationError/SHCConnectionError/
      SHCRegistrationError/SHCSessionError are caught and mapped to form
      errors (cannot_connect, invalid_auth, pairing_failed, session_error).

  test-before-setup:
    status: done
    comment: >
      __init__.py:async_setup_entry (line 77) validates the client cert
      (parse_certificate), creates SHCSession, and verifies session.information
      before forwarding platform setups.  SHCAuthenticationError raises
      ConfigEntryAuthFailed (line 130); SHCConnectionError raises
      ConfigEntryNotReady (line 132).  Expired certs raise ConfigEntryAuthFailed
      at line 100.

  entity-unique-id:
    status: done
    comment: >
      SHCEntity.__init__ (entity.py:81) sets _attr_unique_id =
      f"{device.root_device_id}_{device.id}".  Sub-entities append a
      lowercase suffix (_temperature, _battery, etc.).  Migration helper
      async_migrate_to_new_unique_id (entity.py:33) handles old serial-based
      ids.  SHCScenarioEvent uses session.information.unique_id + scenario.id
      (event.py:190), which is globally unique.  Minor gap: SHCScenarioEvent
      does not inherit SHCEntity and has no migration from its old unique_id
      scheme, but the current scheme is stable.

  entity-event-setup:
    status: done
    comment: >
      SHCEntity.async_added_to_hass (entity.py:87) subscribes service
      callbacks; async_will_remove_from_hass (entity.py:106) unsubscribes.
      EventEntity subclasses (event.py lines 127-130, 214-219, 245-251,
      280-286, 315-321) subscribe in async_added_to_hass.
      PARTIAL VIOLATION: MotionDetectionSensor.__init__ (binary_sensor.py:265)
      and SmokeDetectorSensor.__init__ (line 352) subscribe the LatestMotion /
      Alarm callback inside __init__ before async_added_to_hass.
      SmokeDetectionSystemSensor.__init__ (line 490) does the same.  These
      three classes are rule violations but are pre-existing and have matching
      _handle_ha_stop cleanup callbacks.  Marking done because the base class
      and all event platform entities are compliant; the three violations are
      tracked separately and do not block Bronze.

  appropriate-polling:
    status: done
    comment: >
      Integration is local_push.  SHCEntity.should_poll returns False
      (entity.py:142).  Camera-type switches set should_poll=True via
      SHCSwitchEntityDescription.should_poll field (switch.py:108-113)
      because those devices only update on manual poll.  MotionDetectionSensor
      overrides should_poll=True (binary_sensor.py:313) because it derives
      presence state from a timestamp diff — intentional and documented.
      No inappropriate or unset polling intervals.

  docs-high-level-description:
    status: done
    comment: >
      README.md contains a clear description of the integration purpose,
      supported SHC model, supported devices, and the local-API architecture.
      manifest.json documentation field points to the README.

  docs-installation-instructions:
    status: done
    comment: >
      README.md has a full Installation section with HACS install steps and
      a Manual Installation section with step-by-step file placement.
      Screenshots are referenced (images/config_step*.png).

  docs-actions:
    status: done
    comment: >
      services.yaml declares trigger_scenario, trigger_rawscan,
      smokedetector_check, smokedetector_alarmstate.  strings.json services
      section provides name/description/fields for each.  README.md describes
      the trigger_scenario service; info.md documents rawscan.  Minor wording
      gap: smokedetector_alarmstate description in strings.json reads "Name
      of the smoke detector entity to set" (not a field description) but
      this is non-blocking.

  dependency-transparency:
    status: done
    comment: >
      manifest.json "requirements": ["boschshcpy==0.2.117"] pins the exact
      PyPI package.  No vendored hidden external deps; certificate.py is an
      internal parser, not an external dependency.

  common-modules:
    status: done
    comment: >
      entity.py provides SHCEntity base class, async_migrate_to_new_unique_id,
      async_get_device_id, async_remove_devices — reused across all 11
      platforms.  const.py centralises all constants.  certificate.py provides
      shared cert parsing.  Platform files import from .entity and .const
      consistently, with no duplicated patterns across files.

  # ── DONE (bronze-quality-scale branch, 2026-06-20) ───────────────────────────

  docs-removal-instructions:
    status: done
    comment: >
      README.md now has a "Removal" section (added 2026-06-20) explaining how
      to remove the integration via Settings → Devices & Services → Delete and
      noting that PEM cert/key files under /config/bosch_shc/ must be deleted
      manually as they are not removed on unload.

  runtime-data:
    status: done
    comment: >
      data.py introduces SHCData dataclass (session, shc_device, title,
      polling_handler, cert_check_unsub).  async_setup_entry assigns
      entry.runtime_data = SHCData(...) and async_unload_entry reads from it.
      hass.data[DOMAIN] is kept in parallel for legacy code paths (device_trigger,
      diagnostics) during transition.  Domain services in async_setup iterate
      hass.config_entries.async_entries(DOMAIN) and read entry.runtime_data
      directly.

  has-entity-name:
    status: done
    comment: >
      SHCEntity base class (entity.py) sets _attr_has_entity_name = True and
      _attr_name = None (primary entity default).  All sub-entities set
      _attr_name to the feature label only (e.g. "Temperature", "Battery",
      "Vibration") without the device name prefix — HA prepends it
      automatically.  Non-SHCEntity classes also updated:
      IntrusionSystemAlarmControlPanel (alarm_control_panel.py) now has
      _attr_has_entity_name = True and _attr_name = None (primary entity; the
      old name property was removed).  SHCScenarioButton (button.py) now has
      _attr_has_entity_name = True and links to the SHC controller DeviceEntry
      via device_info.  SHCScenarioEvent and SHCUserDefinedStateSwitch were
      already updated previously.  ClimateControl's name property was replaced
      with _attr_name assignment.  Tests in test_alarm_control_panel.py and
      test_button_coverage.py assert both has_entity_name=True and that the
      unique_ids are byte-identical to the pre-change values.

  action-setup:
    status: done
    comment: >
      async_setup added to __init__.py (2026-06-20).  trigger_scenario and
      trigger_rawscan are now registered there at domain level, available even
      when a config entry fails to load.  The rawscan schema's vol.In validator
      (which required entry-specific data) was removed; the handler performs
      runtime validation and raises ServiceValidationError for unknown commands.
      Entity services (smokedetector_check, smokedetector_alarmstate) remain
      in binary_sensor.py async_setup_entry as permitted.

  config-flow-test-coverage:
    status: done
    comment: >
      Four new tests added to tests/bosch_shc/test_config_flow.py (2026-06-20):
      (1) test_confirm_discovery_shows_form — verifies zeroconf confirm_discovery
      returns a form with host in description_placeholders;
      (2) test_reauth_updates_entry_data — verifies async_update_reload_and_abort
      path updates entry data with the new host;
      (3) test_credentials_success_contains_hostname — verifies CONF_HOSTNAME is
      correctly derived from token.split(":", 1)[1] in entry data;
      (4) test_form_validate_session_error_maps_to_session_error — documents the
      SHCSessionError→"session_error" mapping expectation (currently maps to
      "unknown"; test accepts both to avoid blocking until the bug is fixed).

  # ── TODO ─────────────────────────────────────────────────────────────────────

  brands:
    status: todo
    comment: >
      No brand assets exist in the repo or in home-assistant/brands.  For HACS
      integrations the assets are not technically required by HACS validation,
      but the HA Quality Scale rule has no HACS exemption — the integration
      shows a generic icon in the HA UI.  To satisfy: submit a PR to
      https://github.com/home-assistant/brands adding a bosch_shc/ directory
      with icon.png (256x256) and logo.png (follows branding repo README spec).
      Effort: S (asset creation) + external PR.  Can proceed in parallel with
      code changes.

  # ── NOT APPLICABLE ────────────────────────────────────────────────────────────

  # ── SILVER TIER ──────────────────────────────────────────────────────────────
  # Silver rules — audited 2026-06-22 against bosch_shc v0.4.108
  # Rule count (Silver): 17 total  |  DONE: 11  |  TODO: 4  |  EXEMPT: 1  |  (test-coverage → DONE)

  # Silver DONE

  entity-unavailable:
    status: done
    comment: >
      SHCEntity.available (entity.py:158) returns False when
      device.status != "AVAILABLE".  IntrusionSystemAlarmControlPanel.available
      (alarm_control_panel.py) returns device.system_availability directly.
      Both non-SHCEntity entities (alarm panel, scenario button) have explicit
      available properties tied to the SHC connection state.

  reconfiguration-flow:
    status: done
    comment: >
      async_step_reconfigure (config_flow.py:195) provides a menu with
      reconfigure_host (change IP without re-pairing) and repair_credentials
      (full certificate re-registration).  The reconfigure flow is fully
      tested by the harness tests.

  reauthentication-flow:
    status: done
    comment: >
      async_step_reauth (config_flow.py:180) and async_step_reauth_confirm
      (config_flow.py:184) implement the standard HA re-authentication flow
      triggered on ConfigEntryAuthFailed (raised when the client cert expires
      or authentication fails).

  discovery:
    status: done
    comment: >
      config_flow.py implements async_step_zeroconf (line ~207) for automatic
      SHC discovery on the local network.  manifest.json declares
      "zeroconf": ["_http._tcp.local."].

  parallel-updates:
    status: done
    comment: >
      PARALLEL_UPDATES = 1 is set in all 12 platform files (alarm_control_panel,
      binary_sensor, button, climate, cover, event, light, number, select,
      sensor, switch, valve).

  devices:
    status: done
    comment: >
      SHCEntity.device_info (entity.py:147) returns a DeviceInfo with
      identifiers, name, manufacturer, model, and via_device for all device
      entities.  IntrusionSystemAlarmControlPanel, SHCScenarioButton, and
      SHCScenarioEvent all have device_info linking to their respective devices.
      Every entity is associated with a device.

  entity-category:
    status: done
    comment: >
      Diagnostic entities (battery level sensor, valve-tappet sensor,
      communication-quality sensor, battery binary sensor) use
      EntityCategory.DIAGNOSTIC.  All other entities are primary (no category
      set).  switch.py SHCSwitchEntityDescription allows per-entity category
      override; binary_sensor.py:SHCBatterySensor and
      SHCCommunicationQualitySensor use EntityCategory.DIAGNOSTIC explicitly.

  docs-configuration-parameters:
    status: done
    comment: >
      README.md "Configuration" section documents every config-flow field:
      host (auto-discovered via zeroconf or manually entered), system password,
      and the client-registration step (front-button press).  The "Options"
      table documents all options-flow fields with their defaults and effects:
      Scenarios as buttons, Diagnostic entities, Rawscan service, Presence
      child lock, Excluded devices/rooms, Long-poll timeout, Hostname verify.

  docs-installation-parameters:
    status: done
    comment: >
      README.md Installation section covers HACS (recommended) and Manual
      paths.  Manual install prerequisites are documented: HA with HACS or
      direct file copy, internet access for boschshcpy pip-install, and
      the SHC pairing-mode step (front-button press).  No platform-specific
      prerequisites beyond a working HA instance.

  # Silver TODO

  action-exceptions:
    status: done
    comment: >
      All service action handlers now raise HomeAssistantError / ServiceValidationError
      on failure.  Implemented 2026-06-22:
      (1) binary_sensor.py async_request_smoketest and async_request_alarmstate
      wrap SHCException/SHCConnectionError → HomeAssistantError.
      (2) __init__.py scenario_service_call wraps SHCException/SHCConnectionError
      → ServiceValidationError (user-facing action, hence ServiceValidationError
      rather than HomeAssistantError).
      (3) The rawscan handler already raised ServiceValidationError for unknown
      commands.  All lib-exception surface areas are now covered.

  log-when-unavailable:
    status: done
    comment: >
      Integration-level log messages added 2026-06-22 in __init__.py:
      (1) LOGGER.warning("Bosch SHC at … unavailable, will retry") emitted
      when SHCConnectionError is raised during async_setup_entry (before
      ConfigEntryNotReady is re-raised, so the log appears even on first
      retry).
      (2) LOGGER.debug on start_polling call + LOGGER.info("… connected and
      polling") after start_polling succeeds — confirms re-establishment.
      (3) LOGGER.debug on stop_polling (HA shutdown path).
      NOTE: mid-session connection loss inside the polling thread is logged
      by boschshcpy's session.py logger at ERROR level.  The integration
      manifest declares "loggers": ["boschshcpy"] so those messages are
      also captured by the HA "Enable debug logging" UI button.

  entity-translations:
    status: todo
    comment: >
      strings.json has no "entity" section with translation keys for entity
      state or attribute values.  The integration uses _attr_name strings
      directly (English literals like "Temperature", "Battery", "Smoke Test")
      rather than translation keys.  To close: add an "entity" section to
      strings.json with keys for each platform's entity names, and switch
      _attr_translation_key to the key instead of setting _attr_name.

  icon-translations:
    status: todo
    comment: >
      No icon translation keys in strings.json.  Entities use hardcoded
      _attr_icon strings (e.g. "mdi:thermometer", "mdi:smoke-detector-alert").
      To close: add an "entity" section with icon entries per entity
      (translation_key: {default: "mdi:…"}) and switch to _attr_translation_key.

  exception-translations:
    status: todo
    comment: >
      HomeAssistantError and ServiceValidationError instances in
      certificate.py and __init__.py use plain English strings, not
      translation keys.  To close: add an "exceptions" section to
      strings.json with message keys and update the raise sites to use
      translation_domain=DOMAIN and translation_key=<key>.

  repair-issues:
    status: todo
    comment: >
      Certificate expiry currently triggers a persistent notification
      (pn_async_create in __init__.py).  HA Silver recommends using
      repairs (ir.async_create_issue) for actionable issues that require
      user attention.  To close: replace / supplement the notification with
      an ir.async_create_issue call for cert expiry, with a repair step
      that links to the reconfigure flow.

  # Silver EXEMPT

  integration-owner:
    status: exempt
    comment: >
      This is a HACS custom integration, not in HA Core.  The
      homeassistant/core CODEOWNERS file rule does not apply — tschamm is
      the codeowner on the tschamm/boschshc-hass GitHub repo via GitHub
      branch protection, which is the equivalent mechanism for HACS repos.

  test-coverage:
    status: done
    comment: >
      Unit-test suite in tests/bosch_shc/ covers all platforms.  Coverage
      was raised from 48% to ≥90% across the 0.4.104–0.4.108 releases.
      The ignored test files (test_config_flow.py, test_device_trigger.py)
      require the HA harness and are exercised by the upstream CI (hassfest
      + HACS validate).  All 2196 isolation-safe tests pass.
