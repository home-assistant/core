is_value:
  target:
    entity:
      - domain: counter
  fields:
    behavior:
      required: true
      default: any
      selector:
        automation_behavior:
          mode: condition
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity:
            - domain: counter
            - domain: input_number
            - domain: number
          mode: is
          number:
            mode: box
