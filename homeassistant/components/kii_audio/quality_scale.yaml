rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration registers no actions.
  appropriate-polling:
    status: exempt
    comment: The integration is local push.
  brands:
    status: exempt
    comment: Brand images are provided through the Home Assistant brands repository.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration registers no actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: The integration entities do not register event callbacks.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration registers no actions.
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: todo
  log-when-unavailable: todo
  parallel-updates: todo
  reauthentication-flow:
    status: exempt
