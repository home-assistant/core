get_gas_prices:
  fields:
    config_entry:
      required: true
      selector:
        config_entry:
          integration: easyenergy
    incl_vat:
      required: true
      default: true
      selector:
        boolean:
    price_type:
      required: false
      default: market
      selector:
        select:
          translation_key: price_type_selector
          options:
            - market
            - invoice
    start:
      required: false
      example: "2024-01-01 00:00:00"
      selector:
        datetime:
    end:
      required: false
      example: "2024-01-01 00:00:00"
      selector:
        datetime:
