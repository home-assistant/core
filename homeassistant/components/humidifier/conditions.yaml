.condition_common: &condition_common
  target: &condition_humidifier_target
    entity:
      domain: humidifier
  fields:
    behavior: &condition_behavior
      required: true
      default: any
      selector:
        select:
          translation_key: condition_behavior
          options:
            - all
            - any

.humidity_threshold_entity: &humidity_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: humidity
  - domain: number
    device_class: humidity

.humidity_threshold_number: &humidity_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

is_off: *condition_common
is_on: *condition_common
is_drying: *condition_common
is_humidifying: *condition_common

is_target_humidity:
  target: *condition_humidifier_target
  fields:
    behavior: *condition_behavior
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: is
          number: *humidity_threshold_number
