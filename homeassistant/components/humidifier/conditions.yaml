.condition_common: &condition_common
  target: &condition_humidifier_target
    entity:
      domain: humidifier
  fields:
    behavior: &condition_behavior
      required: true
      default: any
      selector:
        automation_behavior:
          mode: condition
    for: &condition_for
      required: true
      default: 00:00:00
      selector:
        duration:

.humidity_threshold_entity: &humidity_threshold_entity
  - domain: input_number
    unit_of_measurement: "%"
  - domain: sensor
    device_class: humidity
  - domain: number
    device_class: humidity

.humidity_threshold_number: &humidity_threshold_number
  min: 0
  max: 100
  mode: box
  unit_of_measurement: "%"

is_off: *condition_common
is_on: *condition_common
is_drying: *condition_common
is_humidifying: *condition_common

is_mode:
  target: *condition_humidifier_target
  fields:
    behavior: *condition_behavior
    for: *condition_for
    mode:
      context:
        filter_target: target
      required: true
      selector:
        state:
          attribute: available_modes
          multiple: true

is_target_humidity:
  target: *condition_humidifier_target
  fields:
    behavior: *condition_behavior
    for: *condition_for
    threshold:
      required: true
      selector:
        numeric_threshold:
          entity: *humidity_threshold_entity
          mode: is
          number: *humidity_threshold_number
