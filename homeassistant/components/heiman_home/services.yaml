# Service definitions for Heiman Home integration

read_device_properties:
  name: Read Device Properties
  description: "Read properties from a Heiman device"
  target:
    device:
      integration: heiman_home
  fields:
    device_id:
      name: Device ID
      description: "The ID of the device to read properties from"
      example: "1234567890abcdef"
      required: true
      selector:
        text:
