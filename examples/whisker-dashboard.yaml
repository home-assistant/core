# lovelace_gen
#
# Whisker Dashboard — Litter-Robot + Feeder-Robot + Pets
#
# Plug-and-play: edit the 3 variables below to match your devices, then
# add this file as a dashboard in your Lovelace config. That's it.
#
# Slug = device name lowercased, spaces replaced with underscores.
# Example: "My Litter-Robot" -> "my_litter_robot"
#
# Requires HACS: lovelace_gen, fold-entity-row

{% set robots = ["my_litter_robot"] %}
{% set feeders = ["my_feeder"] %}
{% set pets = ["fluffy", "whiskers"] %}

title: Whisker
views:
  - title: Litter-Robot
    type: sections
    sections:
{% for robot in robots %}
      - type: grid
        cards:
          - type: entities
            title: "{{ robot | replace('_', ' ') | title }}"
            show_header_toggle: false
            entities:
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Status
                entities:
                  - entity: sensor.{{ robot }}_status_code
                    name: Status
                    icon: mdi:robot-vacuum
                  - entity: sensor.{{ robot }}_waste_drawer
                    name: Waste Drawer
                  - entity: sensor.{{ robot }}_litter_level
                    name: Litter Level
                  - entity: sensor.{{ robot }}_pet_weight
                    name: Pet Weight
                  - entity: binary_sensor.{{ robot }}_online
                    name: Online
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Camera
                entities:
                  - entity: switch.{{ robot }}_camera
                    name: Camera
                  - entity: switch.{{ robot }}_camera_recording
                    name: Recording
                  - entity: switch.{{ robot }}_camera_microphone
                    name: Microphone
                  - entity: select.{{ robot }}_camera_view
                    name: View
                  - entity: event.{{ robot }}_motion
                    name: Camera Event
                  - entity: sensor.{{ robot }}
                    name: Last Event
                  - type: button
                    name: Browse Recordings
                    icon: mdi:image-multiple
                    action_name: Open
                    tap_action:
                      action: navigate
                      navigation_path: /media-browser/browser/media-source%3A%2F%2Flitterrobot
          - type: picture-entity
            entity: camera.{{ robot }}_camera
            camera_view: live
            show_name: false
            show_state: false
          - type: entities
            show_header_toggle: false
            entities:
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Controls
                entities:
                  - entity: select.{{ robot }}_clean_cycle_wait_time_minutes
                    name: Cycle Wait Time
                  - entity: switch.{{ robot }}_panel_lockout
                    name: Panel Lockout
                  - entity: select.{{ robot }}_panel_brightness
                    name: Panel Brightness
                  - entity: select.{{ robot }}_globe_light
                    name: Night Light Mode
                  - type: button
                    entity: light.{{ robot }}_night_light
                    name: Custom Colors & Brightness
                    icon: mdi:palette
                    action_name: Open
                    tap_action:
                      action: more-info
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Sleep Schedule
                entities:
                  - entity: time.{{ robot }}_sleep_mode_start_time
                    name: Sleep Start
                  - entity: time.{{ robot }}_sleep_mode_end_time
                    name: Sleep End
                  - entity: sensor.{{ robot }}_sleep_mode_start_time
                    name: Next Sleep
                  - entity: sensor.{{ robot }}_sleep_mode_end_time
                    name: Next Wake
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Actions
                entities:
                  - type: button
                    entity: vacuum.{{ robot }}_litter_box
                    name: Clean Cycle
                    icon: mdi:robot-vacuum
                    action_name: Press
                    tap_action:
                      confirmation:
                        text: Start clean cycle?
                      action: perform-action
                      perform_action: vacuum.start
                      target:
                        entity_id: vacuum.{{ robot }}_litter_box
                  - type: button
                    entity: button.{{ robot }}_reset_waste_drawer
                    name: Reset Waste Drawer
                    icon: mdi:delete-variant
                    action_name: Press
                    tap_action:
                      confirmation:
                        text: Reset waste drawer counter?
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.{{ robot }}_reset_waste_drawer
                  - type: button
                    entity: button.{{ robot }}_reset
                    name: Reset / Recalibrate
                    icon: mdi:restart
                    action_name: Press
                    tap_action:
                      confirmation:
                        text: Reset and recalibrate the litter robot?
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.{{ robot }}_reset
                  - type: button
                    entity: button.{{ robot }}_change_filter
                    name: Change Filter
                    icon: mdi:filter-cog
                    action_name: Press
                    tap_action:
                      confirmation:
                        text: Mark filter as changed?
                      action: perform-action
                      perform_action: button.press
                      target:
                        entity_id: button.{{ robot }}_change_filter
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Alerts
                entities:
                  - entity: binary_sensor.{{ robot }}_drawer_removed
                    name: Drawer Removed
                  - entity: binary_sensor.{{ robot }}_bonnet_removed
                    name: Bonnet Removed
                  - entity: binary_sensor.{{ robot }}_laser_dirty
                    name: Laser Dirty
                  - entity: binary_sensor.{{ robot }}_hopper_connected
                    name: Hopper Connected
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Diagnostics
                entities:
                  - entity: sensor.{{ robot }}_firmware
                    name: Firmware
                  - entity: sensor.{{ robot }}_total_cycles
                    name: Total Cycles
                  - entity: sensor.{{ robot }}_scoops_saved
                    name: Scoops Saved
                  - entity: sensor.{{ robot }}_wi_fi_signal
                    name: WiFi Signal
                  - entity: binary_sensor.{{ robot }}_power_status
                    name: Power Status
                  - entity: sensor.{{ robot }}_last_seen
                    name: Last Seen
                  - entity: sensor.{{ robot }}_setup_date
                    name: Setup Date
                  - entity: sensor.{{ robot }}_next_filter_replacement
                    name: Next Filter Replacement
{% endfor %}

  - title: Feeder
    type: sections
    sections:
{% for feeder in feeders %}
      - type: grid
        cards:
          - type: entities
            title: "{{ feeder | replace('_', ' ') | title }}"
            show_header_toggle: false
            entities:
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Status
                entities:
                  - entity: sensor.{{ feeder }}_food_level
                    name: Food Level
                  - entity: sensor.{{ feeder }}_food_dispensed_today
                    name: Dispensed Today
                  - entity: sensor.{{ feeder }}_last_feeding
                    name: Last Feeding
                  - entity: sensor.{{ feeder }}_next_feeding
                    name: Next Feeding
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Controls
                entities:
                  - entity: select.{{ feeder }}_meal_insert_size
                    name: Meal Insert Size
                  - entity: switch.{{ feeder }}_night_light_mode
                    name: Night Light
                  - entity: switch.{{ feeder }}_panel_lockout
                    name: Panel Lockout
                  - entity: switch.{{ feeder }}_gravity_mode
                    name: Gravity Mode
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Actions
                entities:
                  - entity: button.{{ feeder }}_give_snack
                    name: Give Snack
{% endfor %}

  - title: Pets
    type: sections
    sections:
{% for pet in pets %}
      - type: grid
        cards:
          - type: entities
            title: "{{ pet | replace('_', ' ') | title }}"
            show_header_toggle: false
            entities:
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Today
                entities:
                  - entity: sensor.{{ pet }}_weight
                    name: Weight
                  - entity: sensor.{{ pet }}_visits_today
                    name: Visits
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: urine_today
                    name: Urine
                    icon: mdi:water
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: urine_weight_today_oz
                    name: Urine Weight (oz)
                    icon: mdi:scale-balance
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: feces_today
                    name: Feces
                    icon: mdi:circle
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: feces_weight_today_oz
                    name: Feces Weight (oz)
                    icon: mdi:scale-balance
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: total_duration_today
                    name: Total Duration
                    icon: mdi:timer-outline
              - type: custom:fold-entity-row
                head:
                  type: section
                  label: Last Visit
                entities:
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: timestamp
                    name: Time
                    icon: mdi:clock-outline
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: pet_weight
                    name: Weight (lbs)
                    icon: mdi:scale
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: waste_type
                    name: Waste Type
                    icon: mdi:information-outline
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: waste_weight_oz
                    name: Waste Weight (oz)
                    icon: mdi:scale-balance
                  - type: attribute
                    entity: sensor.{{ pet }}_last_visit
                    attribute: duration
                    name: Duration
                    icon: mdi:timer-outline
          - type: markdown
            title: "{{ pet | replace('_', ' ') | title }} — Visit History"
            content: |
              | Time | Waste | Weight | Duration |
              |------|-------|--------|----------|
              {%- raw %}{% set history = state_attr('sensor.{% endraw %}{{ pet }}{% raw %}_last_visit', 'recent_history') or [] %}
              {% for e in history %}
              | {{ e.timestamp[5:16] | replace('T', ' ') if e.timestamp else '' }} | {{ e.get('waste_oz', '') }}{{ ' ' + e.get('waste_type', '') if e.get('waste_type') else '' }} | {{ e.get('weight_lbs', '') }}{{ 'lbs' if e.get('weight_lbs') else '' }} | {{ e.get('duration', '') }} |
              {% endfor %}{% endraw %}
{% endfor %}

  - title: Activity
    type: sections
    sections:
      - type: grid
        cards:
          - type: markdown
            title: "Activity Timeline"
            content: |
              | Time | Pet | Waste | Weight | Duration |
              |------|-----|-------|--------|----------|
              {%- raw %}{% set history = state_attr('sensor.{% endraw %}{{ robots[0] }}{% raw %}', 'recent_history') or [] %}
              {% for e in history %}
              | {{ e.timestamp[5:16] | replace('T', ' ') if e.timestamp else '' }} | {{ e.pet }}{{ ' *' if e.is_reassigned else '' }} | {{ e.get('waste_oz', '') }}{{ ' ' + e.get('waste_type', '') if e.get('waste_type') else '' }} | {{ e.get('weight_lbs', '') }}{{ 'lbs' if e.get('weight_lbs') else '' }} | {{ e.get('duration', '') }} |
              {% endfor %}{% endraw %}

              _* = reassigned_
