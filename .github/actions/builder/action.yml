name: "Image builder"
description: "Build a Docker image"
inputs:
  base-image:
    description: "Base image to use for the build"
    required: true
    # example: 'ghcr.io/home-assistant/amd64-homeassistant-base:2024.6.0'
  cache-image:
    description: "Cache image to use for the build"
    required: false
    default: ""
    # example: 'ghcr.io/home-assistant/amd64-homeassistant:latest'
  tag:
    description: "Tag for the built image"
    required: true
    # example: 'ghcr.io/home-assistant/amd64-homeassistant:2026.2.0'
  labels:
    description: "Labels to add to the built image"
    required: false
    default: ""
    # example: 'io.hass.arch=amd64,io.hass.version=2024.6.0'
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      with:
        cosign-release: "v2.5.3"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Verify base image signature
      run: |
        cosign verify \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          --certificate-identity-regexp "https://github.com/home-assistant/docker/.*" \
          "${{ inputs.base-image }}"

    - name: Verify cache image signature
      id: cache
      continue-on-error: true
      if: ${{ inputs.cache-image != '' }}
      run: |
        cosign verify \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          --certificate-identity-regexp "https://github.com/home-assistant/core/.*" \
          "${{ inputs.cache-image }}"

    - name: Build base image
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: ./Dockerfile
        platforms: ${{ steps.vars.outputs.platform }}
        push: true
        cache-from: ${{ steps.cache.outcome == 'success' && inputs.cache-image || '' }}
        build-args: |
          BUILD_FROM=${{ inputs.base-image }}
        tags: ${{ inputs.tag }}
        outputs: type=image,push=true,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true
        labels: ${{ inputs.labels }}

    - name: Sign image
      run: |
        cosign sign --yes "${{ inputs.tag }}@${{ steps.build.outputs.digest }}"
