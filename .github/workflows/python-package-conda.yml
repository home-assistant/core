## 🌐 4. Website GitHub Pages Membaca SQLite

Sekarang kita buat halaman HTML yang menggunakan `sql.js` untuk membaca file `database/data.db` dan menampilkan data.

### 📄 File `index.html`

```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data dari SQLite</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.8.0/dist/sql-wasm.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>📊 Data Terkini</h1>
    <div id="loading">⏳ Memuat data...</div>
    <div id="content" style="display:none;"></div>
</body>
</html>
```

### 📄 File `script.js`

```javascript
async function loadDatabase() {
    const loading = document.getElementById('loading');
    const content = document.getElementById('content');

    try {
        // Inisialisasi sql.js
        const SQL = await initSqlJs({
            locateFile: file => `https://sql.js.org/dist/${file}`
        });

        // Ambil file .db dari repositori
        const response = await fetch('database/data.db');
        if (!response.ok) throw new Error('Gagal memuat database');
        const buffer = await response.arrayBuffer();
        const uInt8Array = new Uint8Array(buffer);

        // Buat database SQLite
        const db = new SQL.Database(uInt8Array);

        // Query semua tabel (contoh: ambil dari tabel 'users')
        let html = '';
        const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table';");
        if (tables.length === 0) {
            html = '<p>Tidak ada tabel ditemukan.</p>';
        } else {
            for (const tableRow of tables[0].values) {
                const tableName = tableRow[0];
                html += `<h2>Tabel: ${tableName}</h2>`;
                const result = db.exec(`SELECT * FROM ${tableName} LIMIT 100;`);
                if (result.length > 0) {
                    const columns = result[0].columns;
                    const values = result[0].values;
                    html += '<table border="1"><tr>';
                    columns.forEach(col => html += `<th>${col}</th>`);
                    html += '</tr>';
                    values.forEach(row => {
                        html += '<tr>';
                        row.forEach(cell => html += `<td>${cell}</td>`);
                        html += '</tr>';
                    });
                    html += '</table>';
                } else {
                    html += '<p>Tabel kosong.</p>';
                }
            }
        }

        content.innerHTML = html;
        loading.style.display = 'none';
        content.style.display = 'block';
    } catch (err) {
        loading.innerText = '❌ Error: ' + err.message;
    }
}

window.onload = loadDatabase;
```

