## 🚀 5. Menjalankan Seluruh Sistem

### Langkah-langkah Implementasi:

1. **Buat repositori** `sazwan96.github.io` (jika belum).
2. **Tambahkan semua file** di atas ke repositori sesuai struktur.
3. **Buka di GitHub Codespaces**:
   - Codespaces akan otomatis membangun container dengan PostgreSQL dan dependensi Python.
   - Setelah masuk terminal, aktifkan environment: `conda activate myenv`.
4. **Isi data awal di PostgreSQL**:
   - Bisa menggunakan ekstensi VS Code PostgreSQL, atau jalankan skrip Python untuk membuat tabel dan insert data contoh.
   - Contoh skrip inisialisasi: `backend/init_db.py` (bisa dibuat sendiri).
5. **Jalankan ekspor manual**:
   ```bash
   python backend/export_to_sqlite.py
   ```
   File `database/data.db` akan terbuat.
6. **Commit dan push** perubahan (termasuk file `.db`).
7. **Aktifkan GitHub Pages** di repositori (Settings → Pages → pilih branch `main` dan folder `/root`).
8. **Website akan live** di `https://sazwan96.github.io` dan menampilkan data dari SQLite.

### Untuk Pembaruan Data Otomatis:

- Jika Anda menggunakan GitHub Actions (langkah 3), setiap jam file `.db` akan diperbarui dan di-commit ulang. GitHub Pages akan otomatis menampilkan versi terbaru setelah proses commit selesai (mungkin perlu beberapa menit).

---

## ⚠️ Catatan Penting

- **Ukuran File**: File SQLite yang terlalu besar (>50 MB) dapat memperlambat loading di browser. Jika data sangat besar, pertimbangkan untuk mempartisi atau menggunakan `sql.js-httpvfs` yang mendukung akses range.
- **Keamanan**: Jangan pernah menyimpan data sensitif (password, token) di repositori publik. File SQLite yang di-commit juga akan terbaca oleh siapa pun.
- **Performa Query**: `sql.js` menjalankan SQLite murni di browser, jadi query kompleks bisa lambat. Batasi jumlah data yang ditampilkan.
- **Alternatif Backend**: Jika Anda membutuhkan interaksi tulis/baca real-time, pertimbangkan untuk menggunakan backend-as-a-service seperti Supabase (free tier) yang menyediakan REST API dan bisa diakses langsung dari JavaScript.

