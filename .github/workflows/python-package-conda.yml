## 📤 2. Skrip Ekspor Data dari PostgreSQL ke SQLite

File `backend/export_to_sqlite.py` akan membaca seluruh tabel dari PostgreSQL dan menulisnya ke file SQLite. Anda bisa menjalankannya manual atau otomatis.

```python
import os
import pandas as pd
from sqlalchemy import create_engine, inspect

# Ambil koneksi dari environment variable
DATABASE_URL = os.environ.get("DATABASE_URL", "postgresql://postgres:postgres@localhost:5432/appdb")
SQLITE_PATH = os.environ.get("SQLITE_PATH", "database/data.db")

# Buat engine PostgreSQL dan SQLite
pg_engine = create_engine(DATABASE_URL)
sqlite_engine = create_engine(f"sqlite:///{SQLITE_PATH}")

# Dapatkan daftar tabel di PostgreSQL
inspector = inspect(pg_engine)
tables = inspector.get_table_names()

for table in tables:
    print(f"Exporting table: {table}")
    df = pd.read_sql_table(table, pg_engine)
    # Simpan ke SQLite (ganti jika tabel sudah ada)
    df.to_sql(table, sqlite_engine, if_exists='replace', index=False)

print("Export selesai!")
```

Jalankan skrip ini di terminal Codespaces:
```bash
conda activate myenv
python backend/export_to_sqlite.py
```

Setelah itu, file `database/data.db` akan terisi dengan data dari PostgreSQL.

---

## 🤖 3. Otomatisasi dengan GitHub Actions

Agar data di website selalu up-to-date, kita bisa menjalankan ekspor secara berkala (misal setiap jam) menggunakan GitHub Actions. Buat file `.github/workflows/export-db.yml`:

```yaml
name: Export PostgreSQL to SQLite

on:
  schedule:
    - cron: '0 * * * *'   # setiap jam
  workflow_dispatch:       # bisa dijalankan manual

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary pandas sqlalchemy

      - name: Run export script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}   # simpan di secrets GitHub
          SQLITE_PATH: database/data.db
        run: python backend/export_to_sqlite.py

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add database/data.db
          git diff --quiet && git diff --staged --quiet || git commit -m "Update database [skip ci]"
          git push
```

**Catatan:** Anda perlu menyimpan `DATABASE_URL` sebagai **Secret** di repositori (Settings → Secrets and variables → Actions). Isinya adalah string koneksi ke PostgreSQL yang bisa diakses dari GitHub Actions (misalnya menggunakan layanan seperti Supabase, atau jika PostgreSQL di-host di server pribadi).

