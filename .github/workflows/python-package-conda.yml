## 📦 1. Setup Development Environment di GitHub Codespaces

### 📁 Struktur Direktori Proyek

Buat struktur folder seperti ini di repositori `sazwan96.github.io`:

```
sazwan96.github.io/
├── .devcontainer/
│   └── devcontainer.json
├── .github/
│   └── workflows/
│       └── export-db.yml        (otomatisasi ekspor)
├── backend/
│   ├── environment.yml           (dependensi Python)
│   ├── export_to_sqlite.py       (skrip ekspor)
│   └── ... (file Python lain)
├── database/
│   └── data.db                   (file SQLite, dihasilkan)
├── index.html                     (halaman utama)
├── script.js                       (JavaScript pembaca SQLite)
└── style.css
```

### ⚙️ File `.devcontainer/devcontainer.json`

File ini akan mengatur lingkungan Codespaces dengan Python, Conda, dan PostgreSQL.

```json
{
    "name": "Python + PostgreSQL",
    "image": "mcr.microsoft.com/devcontainers/base:ubuntu",
    "features": {
        "ghcr.io/devcontainers/features/python:1": {
            "version": "3.11",
            "installTools": true
        },
        "ghcr.io/devcontainers/features/conda:1": {
            "addCondaForge": true,
            "version": "latest"
        },
        "ghcr.io/devcontainers/features/postgres:1": {
            "version": "16",
            "password": "postgres",
            "database": "appdb"
        }
    },
    "forwardPorts": [5432, 8000],
    "remoteEnv": {
        "DATABASE_URL": "postgresql://postgres:postgres@localhost:5432/appdb",
        "SQLITE_PATH": "${containerWorkspaceFolder}/database/data.db"
    },
    "postCreateCommand": "conda env create -f backend/environment.yml && echo 'conda activate myenv' >> ~/.bashrc",
    "postStartCommand": "sudo service postgresql start",
    "customizations": {
        "vscode": {
            "extensions": [
                "ms-python.python",
                "ms-python.vscode-pylance",
                "cweijan.vscode-postgresql-client2",
                "qwtel.sqlite-viewer"
            ]
        }
    }
}
```

**Penjelasan:**
- `features` menginstall Python, Conda, dan PostgreSQL.
- `remoteEnv` menyimpan URL koneksi database dan path file SQLite.
- `postCreateCommand` membuat environment Conda dari file `environment.yml`.
- `postStartCommand` memastikan PostgreSQL berjalan setiap kali container dimulai.
- Ekstensi VS Code memudahkan manajemen database.

### 🐍 File `backend/environment.yml`

Dependensi Python yang dibutuhkan (termasuk untuk akses PostgreSQL dan SQLite).

```yaml
name: myenv
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - psycopg2
  - sqlalchemy
  - pandas
  - fastapi
  - uvicorn
  - python-dotenv
  - pip:
    - databases[postgresql]
    - sqlite-utils
```

Setelah container dibuat, environment `myenv` akan aktif otomatis (karena kita tambahkan ke `.bashrc`).

