name: Build wheels

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - dev
      - rc
    paths:
      - ".github/workflows/wheels.yml"
      - "homeassistant/package_constraints.txt"
      - "requirements_all.txt"
      - "requirements.txt"
      - "script/gen_requirements_all.py"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name}}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize wheels builder
    if: github.repository_owner == 'yuanzhou029'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
          check-latest: true

      - name: Create Python virtual environment
        run: |
          python -m venv venv
          . venv/bin/activate
          python --version
          pip install "$(grep '^uv' < requirements.txt)"
          uv pip install -r requirements.txt

      - name: Create requirements_diff file
        run: |
          if [[ "${GITHUB_EVENT_NAME}" =~ (schedule|workflow_dispatch) ]]; then
            touch requirements_diff.txt
          else
            curl -s -o requirements_diff.txt https://raw.githubusercontent.com/home-assistant/core/master/requirements.txt
          fi

      - name: Write env-file
        run: |
          (
            echo "GRPC_PYTHON_BUILD_SYSTEM_OPENSSL=true"
            echo "GRPC_PYTHON_BUILD_WITH_CYTHON=true"

            # Fix out of memory issues with rust
            echo "CARGO_NET_GIT_FETCH_WITH_CLI=true"

            # OpenCV headless installation
            echo "CI_BUILD=1"
            echo "ENABLE_HEADLESS=1"

            # Use C-Extension for SQLAlchemy
            echo "REQUIRE_SQLALCHEMY_CEXT=1"
          ) > .env_file

      - name: Upload env_file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: env_file
          path: ./.env_file
          include-hidden-files: true
          overwrite: true

      - name: Upload requirements_diff
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_diff
          path: ./requirements_diff.txt
          overwrite: true

      - name: Generate requirements
        run: |
          . venv/bin/activate
          python -m script.gen_requirements_all ci

      - name: Upload requirements_all_wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: requirements_all_wheels
          path: ./requirements_all_wheels_*.txt

  core:
    name: Build Core wheels ${{ matrix.abi }} for ${{ matrix.arch }} (musllinux_1_2)
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_diff

      - name: Adjust build env
        run: |
          # Don't build wheels for uv as uv requires a greater version of rust as currently available on alpine
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt

      - name: Build wheels for Gitee
        env:
          GRPC_PYTHON_BUILD_SYSTEM_OPENSSL: "true"
          GRPC_PYTHON_BUILD_WITH_CYTHON: "true"
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CI_BUILD: "1"
          ENABLE_HEADLESS: "1"
          REQUIRE_SQLALCHEMY_CEXT: "1"
        run: |
          # 安装构建依赖
          python -m pip install --upgrade pip build setuptools wheel
          
          # 从 requirements.txt 生成 wheel 包
          echo "Building wheels for core dependencies..."
          
          # 创建一个临时目录用于构建
          mkdir -p wheel_build
          cd wheel_build
          
          # 仅为 requirements.txt 中的部分包构建轮子（避免构建整个项目）
          # 这里我们构建一些关键的、通常需要编译的包
          PACKAGES_TO_BUILD="ciso8601 cryptography Pillow orjson PyTurboJPEG zeroconf"
          
          for package in $PACKAGES_TO_BUILD; do
            # 获取 requirements.txt 中的包版本
            PACKAGE_LINE=$(grep "^$package==" ../requirements.txt | head -n 1)
            if [ -n "$PACKAGE_LINE" ]; then
              echo "Building wheel for $PACKAGE_LINE"
              pip wheel --wheel-dir ./wheels --no-deps "$PACKAGE_LINE" || echo "Failed to build $package, skipping..."
            else
              # 如果没有精确版本，尝试构建最新版本
              echo "Building wheel for $package (latest version)"
              pip wheel --wheel-dir ./wheels --no-deps "$package" || echo "Failed to build $package, skipping..."
            fi
          done
          
          cd ..
          echo "Wheel building completed."
          ls -la wheel_build/wheels/ || echo "No wheels built"

      - name: Find and prepare wheels for Gitee upload
        run: |
          # 查找构建的轮子文件
          echo "Finding wheel files..."
          find . -name "*.whl" -type f
          
          # 创建目录存放轮子文件
          mkdir -p gitee_wheels
          find . -name "*.whl" -type f -exec cp {} gitee_wheels/ \;
          
          # 显示找到的文件
          echo "Found $(ls gitee_wheels/*.whl 2>/dev/null | wc -l) wheel files for Gitee upload"
          ls -la gitee_wheels/ || echo "No wheel files found"

      - name: Upload wheels to Gitee
        if: ${{ env.GITEE_TOKEN != '' }}
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
        run: |
          if [ -n "$(ls gitee_wheels/*.whl 2>/dev/null)" ]; then
            echo "Uploading wheels to Gitee repository..."
            
            # 克隆 Gitee 仓库
            git clone "https://${{ secrets.GITEE_USERNAME }}:${GITEE_TOKEN}@gitee.com/xahwkj/ha-mirror.git" gitee_repo
            cd gitee_repo
            
            # 配置 git
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            
            # 复制轮子文件到 Gitee 仓库
            cp ../gitee_wheels/*.whl ./
            
            # 添加、提交并推送
            git add *.whl
            if ! git diff --cached --quiet; then
              git commit -m "Add compiled wheels for ${{ matrix.arch }} [ci skip]"
              git push origin main
              echo "Successfully uploaded wheels to Gitee"
            else
              echo "No new wheels to upload"
            fi
          else
            echo "No wheel files found to upload to Gitee"
          fi

  integrations:
    name: Build wheels ${{ matrix.abi }} for ${{ matrix.arch }}
    if: github.repository_owner == 'yuanzhou029'
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        abi: ["cp314"]
        arch: ["amd64", "aarch64"]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download env_file
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: env_file

      - name: Download requirements_diff
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_diff

      - name: Download requirements_all_wheels
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: requirements_all_wheels

      - name: Adjust build env
        run: |
          # Do not pin numpy in wheels building
          sed -i "/numpy/d" homeassistant/package_constraints.txt
          # Don't build wheels for uv as uv requires a greater version of rust as currently available on alpine
          sed -i "/uv/d" requirements.txt
          sed -i "/uv/d" requirements_diff.txt

      - name: Build wheels for Gitee
        env:
          GRPC_PYTHON_BUILD_SYSTEM_OPENSSL: "true"
          GRPC_PYTHON_BUILD_WITH_CYTHON: "true"
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CI_BUILD: "1"
          ENABLE_HEADLESS: "1"
          REQUIRE_SQLALCHEMY_CEXT: "1"
        run: |
          # 安装构建依赖
          python -m pip install --upgrade pip build setuptools wheel
          
          # 从 requirements_all_wheels 文件生成 wheel 包
          echo "Building wheels for integration dependencies..."
          
          # 创建一个临时目录用于构建
          mkdir -p wheel_build
          cd wheel_build
          
          # 根据 requirements_all_wheels 文件构建轮子包
          # 首先确定当前架构对应的文件
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            REQ_FILE="../requirements_all_wheels_amd64.txt"
          else
            REQ_FILE="../requirements_all_wheels_aarch64.txt"
          fi
          
          if [ -f "$REQ_FILE" ]; then
            echo "Using requirements file: $REQ_FILE"
            # 读取需求文件并构建轮子
            while IFS= read -r line; do
              # 跳过空行和注释
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$line" ]] && continue
              
              # 检查是否是包声明行
              if [[ "$line" =~ ^[a-zA-Z] ]]; then
                # 尝试构建这个包的轮子
                echo "Building wheel for: $line"
                pip wheel --wheel-dir ./wheels --no-deps "$line" || echo "Failed to build $line, skipping..."
              fi
            done < "$REQ_FILE"
          else
            echo "Requirements file $REQ_FILE not found, building common integration packages"
            # 构建一些常见的集成依赖包
            PACKAGES_TO_BUILD="pybluez ffmpeg-python pytz requests-oauthlib"
            for package in $PACKAGES_TO_BUILD; do
              # 尝试构建包
              echo "Building wheel for $package"
              pip wheel --wheel-dir ./wheels --no-deps "$package" || echo "Failed to build $package, skipping..."
            done
          fi
          
          cd ..
          echo "Wheel building for integrations completed."
          ls -la wheel_build/wheels/ || echo "No wheels built"

      - name: Find and prepare wheels for Gitee upload
        run: |
          # 查找构建的轮子文件
          echo "Finding wheel files..."
          find . -name "*.whl" -type f
          
          # 创建目录存放轮子文件
          mkdir -p gitee_wheels
          find . -name "*.whl" -type f -exec cp {} gitee_wheels/ \;
          
          # 显示找到的文件
          echo "Found $(ls gitee_wheels/*.whl 2>/dev/null | wc -l) wheel files for Gitee upload"
          ls -la gitee_wheels/ || echo "No wheel files found"

      - name: Upload wheels to Gitee
        if: ${{ env.GITEE_TOKEN != '' }}
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
        run: |
          if [ -n "$(ls gitee_wheels/*.whl 2>/dev/null)" ]; then
            echo "Uploading wheels to Gitee repository..."
            
            # 克隆 Gitee 仓库
            git clone "https://${{ secrets.GITEE_USERNAME }}:${GITEE_TOKEN}@gitee.com/xahwkj/ha-mirror.git" gitee_repo
            cd gitee_repo
            
            # 配置 git
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            
            # 复制轮子文件到 Gitee 仓库
            cp ../gitee_wheels/*.whl ./
            
            # 添加、提交并推送
            git add *.whl
            if ! git diff --cached --quiet; then
              git commit -m "Add compiled wheels for ${{ matrix.arch }} [ci skip]"
              git push origin main
              echo "Successfully uploaded wheels to Gitee"
            else
              echo "No new wheels to upload"
            fi
          else
            echo "No wheel files found to upload to Gitee"
          fi
